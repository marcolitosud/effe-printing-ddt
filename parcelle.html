<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Parcelle — Studio Pizzone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410; --bg-soft: #221b15;
    --bg-card: rgba(245,241,232,0.06); --bg-card-hover: rgba(245,241,232,0.1);
    --border: rgba(245,241,232,0.14); --border-hover: rgba(201,167,111,0.55);
    --ivory: #fbf8f0; --ivory-soft: #e8e0cc; --ivory-muted: rgba(251,248,240,0.75); --ivory-faint: rgba(251,248,240,0.5);
    --terra: #c9a76f; --terra-soft: #b8935f; --accent: #d9ba85;
    --green: #7fb069; --yellow: #e6b34a; --red: #d4675b; --blue: #6ba3d4;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ivory); font-family: 'Inter', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(26,20,16,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  }
  .back-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--ivory);
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 18px;
  }
  .topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; flex: 1; letter-spacing: -0.005em; }
  .topbar-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 120px; }
  @media (min-width: 700px) { .container { padding: 32px 24px 120px; } }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  @media (min-width: 700px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }

  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 16px;
  }
  .stat-card .lbl {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ivory-muted); margin-bottom: 6px;
  }
  .stat-card .val {
    font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500;
    line-height: 1;
  }
  .stat-card.emesso .val { color: var(--terra); }
  .stat-card.incassato .val { color: var(--green); }
  .stat-card.attesa .val { color: var(--yellow); }
  .stat-card.ritardo .val { color: var(--red); }

  .stat-card .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ivory-faint); margin-top: 4px; letter-spacing: 0.05em;
  }

  .tabs {
    display: flex; gap: 6px; margin-bottom: 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 4px;
  }
  .tab {
    flex: 1; background: transparent; border: none; color: var(--ivory-muted);
    padding: 9px 14px; border-radius: 8px; font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500;
    cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .tab.active { background: var(--terra); color: var(--bg); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* CANTIERI CARDS */
  .cantieri-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 700px) { .cantieri-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
  @media (min-width: 1000px) { .cantieri-grid { grid-template-columns: repeat(3, 1fr); } }

  .cantiere {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px;
    text-decoration: none; color: inherit; display: block;
    transition: all 0.3s;
  }
  .cantiere:hover {
    background: var(--bg-card-hover); border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .cantiere-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 10px;
  }
  .cantiere-title {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500;
    line-height: 1.2; letter-spacing: -0.005em;
  }
  .cantiere-title em { font-style: italic; color: var(--terra); font-weight: 400; }
  .cantiere-client { font-size: 12px; color: var(--ivory-muted); margin-bottom: 14px; }

  .cantiere-stats {
    padding-top: 12px; border-top: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
  }
  .cs-row { display: flex; flex-direction: column; gap: 2px; }
  .cs-row .v { font-size: 13px; color: var(--ivory); }
  .cs-row .v.g { color: var(--green); }
  .cs-row .v.r { color: var(--red); }
  .cs-row .v.y { color: var(--yellow); }
  .cs-row .l { font-size: 9px; color: var(--ivory-muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .pill {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px; white-space: nowrap;
  }
  .p-ok { background: rgba(127,176,105,0.15); color: var(--green); border: 1px solid rgba(127,176,105,0.3); }
  .p-warn { background: rgba(230,179,74,0.15); color: var(--yellow); border: 1px solid rgba(230,179,74,0.3); }
  .p-err { background: rgba(212,103,91,0.15); color: var(--red); border: 1px solid rgba(212,103,91,0.3); }
  .p-none { background: rgba(245,241,232,0.06); color: var(--ivory-muted); border: 1px solid var(--border); }

  /* TABLE PARCELLE */
  .parcelle-table-wrap {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
  }

  .parcelle-list {
    display: flex; flex-direction: column;
  }

  .parcella-row {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px 14px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    text-decoration: none; color: inherit;
    transition: background 0.2s;
    position: relative;
  }
  .parcella-row:last-child { border-bottom: none; }
  .parcella-row:hover { background: rgba(245,241,232,0.03); }

  .parcella-row.st-pagata { border-left: 3px solid var(--green); }
  .parcella-row.st-ritardo { border-left: 3px solid var(--red); }
  .parcella-row.st-attenzione { border-left: 3px solid var(--yellow); }
  .parcella-row.st-emessa { border-left: 3px solid transparent; }

  .parcella-main { min-width: 0; }
  .parcella-num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--terra); letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .parcella-desc {
    font-family: 'Cormorant Garamond', serif; font-size: 17px;
    font-weight: 500; line-height: 1.25; margin-bottom: 4px;
  }
  .parcella-cant {
    font-size: 12px; color: var(--ivory-muted);
  }
  .parcella-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ivory-faint); margin-top: 4px; letter-spacing: 0.05em;
  }

  .parcella-amount { text-align: right; flex-shrink: 0; }
  .parcella-amount .net {
    font-family: 'Cormorant Garamond', serif; font-size: 20px;
    font-weight: 500; color: var(--ivory); line-height: 1;
  }
  .parcella-amount .net.g { color: var(--green); }
  .parcella-amount .net.r { color: var(--red); }
  .parcella-amount .imp {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ivory-muted); margin-top: 4px; letter-spacing: 0.05em;
  }

  /* FILTERS */
  .filters {
    display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap;
  }
  .chip {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory-muted); padding: 7px 12px; border-radius: 8px;
    font-size: 11px; cursor: pointer; font-family: inherit;
  }
  .chip.active { background: var(--terra); color: var(--bg); border-color: var(--terra); }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--ivory-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; margin-bottom: 6px; color: var(--ivory); }
  .empty h3 em { font-style: italic; color: var(--terra); }

  .loader {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--terra);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(26,20,16,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">Parcelle <em>& contabilità</em></div>
</div>

<div class="container">

  <!-- STATS GLOBALI -->
  <div class="stats-grid">
    <div class="stat-card emesso">
      <div class="lbl">Fatturato</div>
      <div class="val" id="s-fatturato">€0</div>
      <div class="sub" id="s-fatturato-n">0 parcelle</div>
    </div>
    <div class="stat-card incassato">
      <div class="lbl">Incassato netto</div>
      <div class="val" id="s-incassato">€0</div>
      <div class="sub" id="s-incassato-n">0 pagate</div>
    </div>
    <div class="stat-card attesa">
      <div class="lbl">In attesa</div>
      <div class="val" id="s-attesa">€0</div>
      <div class="sub" id="s-attesa-n">0 parcelle</div>
    </div>
    <div class="stat-card ritardo">
      <div class="lbl">In ritardo</div>
      <div class="val" id="s-ritardo">€0</div>
      <div class="sub" id="s-ritardo-n">0 parcelle</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="cantieri">Per cantiere</button>
    <button class="tab" data-tab="parcelle">Tutte le parcelle</button>
  </div>

  <!-- PANEL CANTIERI -->
  <div class="panel active" id="panel-cantieri">
    <div id="cantieri-list"></div>
  </div>

  <!-- PANEL PARCELLE -->
  <div class="panel" id="panel-parcelle">
    <div class="filters">
      <button class="chip active" data-pf="all">Tutte</button>
      <button class="chip" data-pf="pagata">🟢 Pagate</button>
      <button class="chip" data-pf="attenzione">🟡 Attenzione</button>
      <button class="chip" data-pf="ritardo">🔴 In ritardo</button>
      <button class="chip" data-pf="emessa">⚪ Emesse</button>
    </div>
    <div class="parcelle-table-wrap">
      <div class="parcelle-list" id="parcelle-list"></div>
    </div>
  </div>

</div>

<div class="loading-overlay" id="loading"><div class="loader"></div></div>

<script>
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function $(id) { return document.getElementById(id); }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtEuro(n) {
  if (n === null || n === undefined) return '€0';
  return '€' + Number(n).toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtEuroShort(n) {
  if (!n) return '€0';
  const v = Number(n);
  if (v >= 1000000) return '€' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '€' + (v/1000).toFixed(0) + 'k';
  return '€' + v.toFixed(0);
}
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('it-IT'); }
function daysDiff(d) {
  const a = new Date(d);
  const b = new Date();
  return Math.floor((b - a) / (1000*60*60*24));
}
function getStatus(p) {
  if (p.data_pagamento) return 'pagata';
  if (!p.data_scadenza) return 'emessa';
  const diff = daysDiff(p.data_scadenza);
  if (diff <= 0) return 'emessa';
  if (diff > 30) return 'ritardo';
  if (diff > 15) return 'attenzione';
  return 'emessa';
}

let state = { cantieri: [], riepiloghi: {}, parcelle: [], parcelleFilter: 'all' };

async function loadAll() {
  $('loading').style.display = 'flex';
  try {
    const [{data: c}, {data: r}, {data: p}] = await Promise.all([
      sb.from('cantieri').select('id, nome, cliente, stato').order('created_at', { ascending: false }),
      sb.from('v_parcelle_riepilogo').select('*'),
      sb.from('parcelle').select('*, cantieri(id, nome, cliente)').order('data_emissione', { ascending: false })
    ]);
    state.cantieri = c || [];
    state.riepiloghi = {};
    (r || []).forEach(x => { state.riepiloghi[x.cantiere_id] = x; });
    state.parcelle = p || [];
    render();
  } catch (err) {
    console.error(err);
  } finally {
    $('loading').style.display = 'none';
  }
}

function render() {
  // stats globali (dai riepiloghi)
  let totFatt = 0, totInc = 0, totAtt = 0, totRit = 0;
  let nFatt = 0, nInc = 0, nAtt = 0, nRit = 0;
  Object.values(state.riepiloghi).forEach(r => {
    totFatt += Number(r.totale_fatturato) || 0;
    totInc += Number(r.totale_incassato_netto) || 0;
    totAtt += Number(r.totale_in_attesa) || 0;
    totRit += Number(r.totale_in_ritardo) || 0;
    nFatt += Number(r.numero_parcelle) || 0;
    nInc += Number(r.parcelle_pagate) || 0;
    nRit += Number(r.parcelle_in_ritardo) || 0;
  });
  nAtt = nFatt - nInc - nRit;

  $('s-fatturato').textContent = fmtEuro(totFatt);
  $('s-incassato').textContent = fmtEuro(totInc);
  $('s-attesa').textContent = fmtEuro(totAtt);
  $('s-ritardo').textContent = fmtEuro(totRit);
  $('s-fatturato-n').textContent = nFatt + ' parcelle';
  $('s-incassato-n').textContent = nInc + ' pagate';
  $('s-attesa-n').textContent = Math.max(0,nAtt) + ' parcelle';
  $('s-ritardo-n').textContent = nRit + ' parcelle';

  renderCantieri();
  renderParcelle();
}

function renderCantieri() {
  const c = $('cantieri-list');
  if (state.cantieri.length === 0) {
    c.innerHTML = `<div class="empty">
      <div class="empty-icon">🏗️</div>
      <h3>Nessun <em>cantiere</em></h3>
      <p>Crea prima un cantiere per iniziare la contabilità</p>
    </div>`;
    return;
  }
  c.innerHTML = '<div class="cantieri-grid">' + state.cantieri.map(cc => {
    const r = state.riepiloghi[cc.id] || {};
    const fatt = Number(r.totale_fatturato) || 0;
    const inc = Number(r.totale_incassato_netto) || 0;
    const att = Number(r.totale_in_attesa) || 0;
    const rit = Number(r.totale_in_ritardo) || 0;
    const nP = Number(r.numero_parcelle) || 0;
    const nRit = Number(r.parcelle_in_ritardo) || 0;
    const contr = Number(r.importo_totale) || 0;
    const dl = r.direttore_lavori;

    let pill = '';
    if (nRit > 0) pill = `<span class="pill p-err">${nRit} in ritardo</span>`;
    else if (inc > 0 && fatt > 0) pill = `<span class="pill p-ok">${nP} parcelle</span>`;
    else if (nP > 0) pill = `<span class="pill p-warn">${nP} da incassare</span>`;
    else pill = `<span class="pill p-none">Nessuna</span>`;

    return `
      <a class="cantiere" href="parcelle-cantiere.html?cantiere=${cc.id}">
        <div class="cantiere-head">
          <div>
            <div class="cantiere-title">${escapeHtml(cc.nome)}</div>
            ${cc.cliente ? `<div class="cantiere-client">${escapeHtml(cc.cliente)}${dl ? ' · DL' : ''}</div>` : (dl ? '<div class="cantiere-client">Direttore lavori</div>' : '')}
          </div>
          ${pill}
        </div>
        <div class="cantiere-stats">
          <div class="cs-row">
            <div class="v">${fmtEuroShort(contr)}</div>
            <div class="l">Contratto</div>
          </div>
          <div class="cs-row">
            <div class="v g">${fmtEuroShort(inc)}</div>
            <div class="l">Incassato</div>
          </div>
          <div class="cs-row">
            <div class="v y">${fmtEuroShort(att)}</div>
            <div class="l">In attesa</div>
          </div>
          <div class="cs-row">
            <div class="v r">${fmtEuroShort(rit)}</div>
            <div class="l">In ritardo</div>
          </div>
        </div>
      </a>
    `;
  }).join('') + '</div>';
}

function renderParcelle() {
  const filtered = state.parcelle.filter(p => {
    if (state.parcelleFilter === 'all') return true;
    return getStatus(p) === state.parcelleFilter;
  });

  const c = $('parcelle-list');
  if (filtered.length === 0) {
    c.innerHTML = `<div class="empty">
      <div class="empty-icon">📄</div>
      <h3>Nessuna <em>parcella</em></h3>
      <p>Seleziona un cantiere per emettere la prima</p>
    </div>`;
    return;
  }

  c.innerHTML = filtered.map(p => {
    const status = getStatus(p);
    const statusCls = 'st-' + status;
    const netCls = status === 'pagata' ? 'g' : (status === 'ritardo' ? 'r' : '');
    const cName = p.cantieri ? p.cantieri.nome : '—';
    const emittente = p.tipo_emittente === 'opus' ? 'OPUS ARCH' : 'Architetto';
    let statusPill = '';
    if (status === 'pagata') statusPill = '<span class="pill p-ok">Pagata</span>';
    else if (status === 'ritardo') statusPill = `<span class="pill p-err">Ritardo ${daysDiff(p.data_scadenza)}gg</span>`;
    else if (status === 'attenzione') statusPill = `<span class="pill p-warn">Scaduta ${daysDiff(p.data_scadenza)}gg</span>`;
    else if (p.data_scadenza) statusPill = `<span class="pill p-none">Scade ${fmtDate(p.data_scadenza)}</span>`;
    else statusPill = '<span class="pill p-none">Emessa</span>';

    return `
      <a class="parcella-row ${statusCls}" href="parcelle-cantiere.html?cantiere=${p.cantiere_id}&parcella=${p.id}">
        <div class="parcella-main">
          <div class="parcella-num">${escapeHtml(p.numero)} · ${emittente} · ${fmtDate(p.data_emissione)}</div>
          <div class="parcella-desc">${escapeHtml(p.descrizione || '(senza descrizione)')}</div>
          <div class="parcella-cant">${escapeHtml(cName)}</div>
          <div class="parcella-meta">${statusPill}</div>
        </div>
        <div class="parcella-amount">
          <div class="net ${netCls}">${fmtEuro(p.netto_incassare)}</div>
          <div class="imp">imp. ${fmtEuro(p.imponibile)}</div>
        </div>
      </a>
    `;
  }).join('');
}

// TABS
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    t.classList.add('active');
    $('panel-' + t.dataset.tab).classList.add('active');
  };
});

// FILTERS
document.querySelectorAll('[data-pf]').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('[data-pf]').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.parcelleFilter = c.dataset.pf;
    renderParcelle();
  };
});

loadAll();
</script>
</body>
</html>
