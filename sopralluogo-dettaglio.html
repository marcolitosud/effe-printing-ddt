<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Sopralluogo — Studio Pizzone</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="Pizzone">
<meta name="application-name" content="Studio Pizzone">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg: #1a1410; --bg-soft: #221b15;
    --bg-card: rgba(245,241,232,0.06); --bg-card-hover: rgba(245,241,232,0.1);
    --border: rgba(245,241,232,0.14); --border-hover: rgba(201,167,111,0.55);
    --ivory: #fbf8f0; --ivory-soft: #e8e0cc; --ivory-muted: rgba(251,248,240,0.75); --ivory-faint: rgba(251,248,240,0.5);
    --terra: #c9a76f; --terra-soft: #b8935f; --accent: #d9ba85;
    --green: #7fb069; --yellow: #e6b34a; --red: #d4675b; --blue: #6ba3d4; --purple: #a78bc9;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ivory); font-family: 'Inter', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  /* TOPBAR */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(26,20,16,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  }
  .back-btn, .icon-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--ivory);
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 16px; flex-shrink: 0; cursor: pointer;
  }
  .icon-btn { font-family: inherit; }
  .topbar-title { flex: 1; min-width: 0; }
  .topbar-title h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500;
    letter-spacing: -0.005em; line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-title h1 em { font-style: italic; color: var(--terra); font-weight: 400; }
  .topbar-title .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ivory-muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
  }

  .container { max-width: 1400px; margin: 0 auto; padding: 16px 12px 100px; }
  @media (min-width: 700px) { .container { padding: 20px 24px 100px; } }

  /* SOPRALLUOGO SELECTOR */
  .sopralluogo-selector {
    display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 4px; margin-bottom: 14px;
  }
  .sopralluogo-selector::-webkit-scrollbar { display: none; }

  .sopr-chip {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory-muted); padding: 8px 14px; border-radius: 10px;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: inherit; display: flex; gap: 8px; align-items: center;
  }
  .sopr-chip.active {
    background: var(--terra); border-color: var(--terra); color: var(--bg);
  }
  .sopr-chip .date { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.7; }
  .sopr-chip.active .date { opacity: 0.85; }

  .sopr-add-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--terra); padding: 8px 14px; border-radius: 10px;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: inherit;
  }

  /* PIANI TABS */
  .piani-tabs {
    display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 4px; margin-bottom: 14px;
  }
  .piani-tabs::-webkit-scrollbar { display: none; }

  .piano-tab {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory-muted); padding: 8px 14px; border-radius: 10px;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: inherit; display: flex; gap: 6px; align-items: center;
  }
  .piano-tab.active {
    background: var(--blue); border-color: var(--blue); color: #fff;
  }
  .piano-tab .count {
    background: rgba(0,0,0,0.2); padding: 1px 5px; border-radius: 4px; font-size: 10px;
  }
  .piano-tab:not(.active) .count { background: rgba(245,241,232,0.08); }

  .piano-add-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--blue); padding: 8px 14px; border-radius: 10px;
    font-size: 12px; cursor: pointer; white-space: nowrap;
    font-family: inherit;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 10px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 6px;
  }

  .tool-btn {
    background: transparent; border: 1px solid transparent; color: var(--ivory);
    padding: 8px 12px; border-radius: 8px; font-size: 11px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tool-btn:hover { background: var(--bg-card-hover); }
  .tool-btn.active {
    background: var(--terra); color: var(--bg); border-color: var(--terra);
  }
  .tool-btn.danger { color: var(--red); }
  .tool-btn.danger:hover { background: rgba(212,103,91,0.1); }

  /* CANVAS PIANTINA */
  .canvas-wrap {
    background: #fff;
    border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; position: relative;
    max-height: 75vh;
    touch-action: none;
  }

  .canvas-empty {
    aspect-ratio: 4/3;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg-card); color: var(--ivory-muted);
    padding: 40px 20px; text-align: center;
  }
  .canvas-empty .ic { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
  .canvas-empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: var(--ivory); margin-bottom: 6px; }
  .canvas-empty p { font-size: 13px; margin-bottom: 20px; }

  /* zoom viewport */
  .canvas-scroll {
    overflow: hidden;
    max-height: 75vh;
    position: relative;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .canvas-inner {
    position: relative;
    display: inline-block;
    min-width: 100%;
    transform-origin: 0 0;
    transition: transform 0.15s ease-out;
    will-change: transform;
  }
  .canvas-inner.panning { transition: none; }

  .canvas-inner img, .canvas-inner canvas {
    display: block;
    max-width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  .canvas-overlay {
    position: absolute; inset: 0;
    cursor: crosshair;
    touch-action: none;
  }
  .canvas-overlay.move-mode { cursor: move; }

  /* Controlli ZOOM */
  .zoom-ctrl {
    position: absolute;
    right: 10px; bottom: 10px;
    display: flex; flex-direction: column; gap: 4px;
    background: rgba(26, 20, 16, 0.82);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(201,167,111,0.3);
    border-radius: 10px;
    padding: 4px;
    z-index: 20;
  }
  .zoom-ctrl button {
    width: 36px; height: 36px;
    background: transparent;
    border: none; color: var(--ivory);
    font-size: 18px;
    font-weight: 300;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    padding: 0;
  }
  .zoom-ctrl button:active { background: rgba(201,167,111,0.2); }
  .zoom-ctrl button:hover { background: rgba(201,167,111,0.12); }
  .zoom-ctrl .divider { height: 1px; background: rgba(201,167,111,0.18); margin: 2px 4px; }
  .zoom-indicator {
    position: absolute;
    left: 10px; bottom: 10px;
    background: rgba(26, 20, 16, 0.82);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(201,167,111,0.3);
    color: var(--terra);
    padding: 6px 12px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .zoom-indicator.visible { opacity: 1; }

  /* MARKER SULLA PIANTINA */
  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
    width: 0;
    height: 0;
  }

  .marker-pin {
    width: 20px; height: 20px;
    background: var(--terra);
    border: 2px solid #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.5);
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .marker.todo .marker-pin {
    background: var(--yellow);
    color: #1a1410;
  }

  /* CONO VISUALE che parte dal CENTRO del marker */
  .marker-cone {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    pointer-events: none;
    z-index: 1;
  }
  .marker-cone svg {
    position: absolute;
    top: 0; left: 0;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* LINEE MISURA */
  .measure-svg {
    position: absolute; inset: 0;
    pointer-events: none;
    width: 100%; height: 100%;
  }
  .measure-svg line {
    stroke: var(--red);
    stroke-width: 2.5;
    stroke-dasharray: 4,3;
  }
  .measure-svg circle {
    fill: var(--red);
  }
  .measure-svg text {
    fill: var(--red);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    paint-order: stroke;
    stroke: #fff;
    stroke-width: 3px;
  }

  /* MEASURE PREVIEW DOT (first click) */
  .measure-preview {
    position: absolute;
    width: 14px; height: 14px;
    background: var(--red);
    border: 2px solid #fff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 0 4px rgba(212,103,91,0.3);
    animation: pulseDot 1.2s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes pulseDot {
    0%, 100% { box-shadow: 0 0 0 4px rgba(212,103,91,0.3); }
    50% { box-shadow: 0 0 0 10px rgba(212,103,91,0.1); }
  }

  /* BTN */
  .btn {
    background: var(--terra); color: var(--bg);
    border: none; padding: 10px 18px; border-radius: 10px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; font-family: inherit;
  }
  .btn-ghost { background: var(--bg-card); color: var(--ivory); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 8px 14px; font-size: 11px; }
  .btn-block { display: block; width: 100%; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; display: none; align-items: center; justify-content: center;
    padding: 16px; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 20px; max-width: 560px; width: 100%;
    max-height: 92vh; overflow-y: auto; padding: 22px;
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500;
    margin-bottom: 14px; letter-spacing: -0.005em;
  }
  .modal h3 em { font-style: italic; color: var(--terra); font-weight: 400; }

  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--terra); margin-bottom: 5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory); padding: 10px 12px; border-radius: 10px;
    font-size: 16px; font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: 1px solid var(--terra); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

  /* CONO RUOTATORE nel modal */
  .direction-control {
    display: flex; gap: 16px; align-items: center; margin-top: 6px;
  }
  .compass {
    width: 140px; height: 140px; position: relative; flex-shrink: 0;
    border: 2px solid var(--border); border-radius: 50%;
    background: var(--bg-card);
    touch-action: none;
    cursor: grab;
  }
  .compass:active { cursor: grabbing; }
  .compass::before, .compass::after {
    content: ''; position: absolute; background: rgba(245,241,232,0.15);
  }
  .compass::before { top: 0; bottom: 0; left: 50%; width: 1px; transform: translateX(-0.5px); }
  .compass::after { left: 0; right: 0; top: 50%; height: 1px; transform: translateY(-0.5px); }

  .compass-labels { position: absolute; inset: 0; }
  .compass-labels span {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-muted);
    letter-spacing: 0.1em;
  }
  .compass-labels .n { top: 4px; left: 50%; transform: translateX(-50%); color: var(--red); font-weight: bold; }
  .compass-labels .s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .compass-labels .e { right: 6px; top: 50%; transform: translateY(-50%); }
  .compass-labels .w { left: 6px; top: 50%; transform: translateY(-50%); }

  .compass-arrow {
    position: absolute; top: 50%; left: 50%;
    transform-origin: 0 0;
    width: 60px; height: 2px;
    background: linear-gradient(90deg, var(--terra), rgba(201,167,111,0.3));
    pointer-events: none;
  }
  .compass-arrow::before {
    content: '';
    position: absolute;
    right: -2px; top: -5px;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid var(--terra);
  }
  .compass-center {
    position: absolute; top: 50%; left: 50%;
    width: 10px; height: 10px;
    background: var(--terra);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .compass-cone {
    position: absolute; top: 50%; left: 50%;
    width: 0; height: 0;
    transform-origin: 0 0;
  }
  .direction-info {
    display: flex; flex-direction: column; gap: 6px;
  }
  .direction-deg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px; font-weight: 500;
    color: var(--terra); line-height: 1;
  }
  .direction-deg small { font-size: 14px; color: var(--ivory-muted); font-style: italic; }
  .direction-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ivory-muted);
  }

  /* PHOTO GRID nel modal */
  .photo-list {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 6px; margin-top: 6px;
  }
  .photo-thumb {
    aspect-ratio: 1; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; position: relative;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-thumb .rm {
    position: absolute; top: 3px; right: 3px;
    background: rgba(0,0,0,0.7); color: #fff;
    width: 20px; height: 20px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; cursor: pointer; border: none;
  }

  .photo-buttons {
    display: flex; gap: 6px; margin-top: 6px;
  }
  .photo-buttons button, .photo-buttons label {
    flex: 1; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory); padding: 10px; border-radius: 10px; font-size: 11px;
    cursor: pointer; text-align: center; font-family: inherit;
    letter-spacing: 0.05em;
  }

  /* LOADER */
  .loader {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--terra);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(26,20,16,0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 200; backdrop-filter: blur(8px);
  }
  .loading-overlay .txt { font-size: 12px; color: var(--ivory-muted); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-soft); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 12px; font-size: 13px; z-index: 300;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4); opacity: 0;
    transition: opacity 0.3s, transform 0.3s; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* STATUS BAR */
  .status-bar {
    background: rgba(201,167,111,0.1);
    border: 1px solid rgba(201,167,111,0.3);
    border-radius: 10px; padding: 10px 14px;
    font-size: 12px; color: var(--terra);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }
  .status-bar button {
    background: transparent; border: 1px solid var(--terra); color: var(--terra);
    padding: 4px 10px; border-radius: 6px; font-size: 10px; cursor: pointer;
    font-family: inherit; margin-left: auto;
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* EMPTY STATE CANTIERE */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--ivory-muted);
  }
  .empty-state .ic { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400;
    margin-bottom: 8px; color: var(--ivory);
  }
  .empty-state h3 em { font-style: italic; color: var(--terra); }
  .empty-state p { font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="sopralluoghi.html">‹</a>
  <div class="topbar-title">
    <h1 id="topbar-title">Caricamento…</h1>
    <div class="sub" id="topbar-sub">—</div>
  </div>
  <button class="icon-btn" onclick="exportPDF()" title="Export PDF">📄</button>
</div>

<div class="container">

  <!-- SOPRALLUOGHI DISPONIBILI -->
  <div id="sopralluogo-wrap">
    <div class="sopralluogo-selector" id="sopralluogo-selector"></div>
  </div>

  <!-- STATO UTILITÀ -->
  <div id="status-bar-wrap"></div>

  <!-- PIANI TABS -->
  <div id="piani-wrap">
    <div class="piani-tabs" id="piani-tabs"></div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar-wrap"></div>

  <!-- CANVAS PIANTINA -->
  <div id="canvas-wrap"></div>

</div>

<!-- MODAL NUOVO SOPRALLUOGO -->
<div class="modal-overlay" id="modal-new-sopr">
  <div class="modal">
    <h3>Nuovo <em>sopralluogo</em></h3>

    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="ns-nome" placeholder="es. Secondo sopralluogo">
    </div>

    <div class="form-group">
      <label>Tipologia immobile</label>

<script>
// ============================================
// CONFIG
// ============================================
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
}

const cantiereId = new URLSearchParams(location.search).get('cantiere');
if (!cantiereId) location.href = 'sopralluoghi.html';

// ============================================
// STATO GLOBALE
// ============================================
let state = {
  cantiere: null,
  sopralluoghi: [],
  currentSoprId: null,
  piani: [],
  currentPianoId: null,
  marker: [],        // solo del piano corrente
  misure: [],        // solo del piano corrente
  tool: 'marker',    // marker | measure
  measureStart: null, // {x,y} primo punto misura
  editingMarker: null, // marker in editing
  pendingMarkerPos: null, // se sto creando nuovo
  pendingPhotos: [],  // foto temporanee nel modal marker
  direzione: 0,
  imgW: 0, imgH: 0,   // dimensioni piantina renderizzata
  natW: 0, natH: 0    // dimensioni naturali
};

// UTIL
function $(id) { return document.getElementById(id); }
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function toast(msg, type = '') {
  const t = $('toast'); t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoader(txt = 'Caricamento…') { $('loading-text').textContent = txt; $('loading').style.display = 'flex'; }
function hideLoader() { $('loading').style.display = 'none'; }
function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function getStorageUrl(bucket, path) { return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`; }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('it-IT'); }

function degToLabel(deg) {
  const labels = ['Nord','Nord-Est','Est','Sud-Est','Sud','Sud-Ovest','Ovest','Nord-Ovest'];
  const idx = Math.round(deg/45) % 8;
  return labels[idx];
}

// ============================================
// CARICAMENTO INIZIALE
// ============================================
async function loadAll() {
  showLoader();
  try {
    const { data: c, error: e1 } = await sb.from('cantieri').select('*').eq('id', cantiereId).single();
    if (e1) throw e1;
    state.cantiere = c;
    $('topbar-title').innerHTML = escapeHtml(c.nome);
    $('topbar-sub').textContent = c.cliente || c.indirizzo || '';

    const { data: sopr } = await sb.from('sopralluoghi')
      .select('*').eq('cantiere_id', cantiereId).order('created_at');
    state.sopralluoghi = sopr || [];

    if (state.sopralluoghi.length === 0) {
      // nessun sopralluogo → form primo sopralluogo
      renderNoSopralluogo();
    } else {
      state.currentSoprId = state.currentSoprId || state.sopralluoghi[0].id;
      await loadSopralluogo();
    }
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
    console.error(err);
  } finally {
    hideLoader();
  }
}

function renderNoSopralluogo() {
  $('sopralluogo-wrap').innerHTML = '';
  $('piani-wrap').innerHTML = '';
  $('toolbar-wrap').innerHTML = '';
  $('canvas-wrap').innerHTML = `
    <div class="empty-state">
      <div class="ic">📐</div>
      <h3>Primo <em>sopralluogo</em></h3>
      <p>Crea il primo sopralluogo per questo cantiere.<br>Potrai aggiungere piantine, punti foto e misure.</p>
      <button class="btn" onclick="openNewSopralluogo(true)">+ Crea primo sopralluogo</button>
    </div>
  `;
}

function renderSopralluoghiSelector() {
  // Se il wrap è vuoto (dopo renderNoSopralluogo), ricrea il div selector
  const wrap = $('sopralluogo-wrap');
  if (!$('sopralluogo-selector')) {
    wrap.innerHTML = '<div class="sopralluogo-selector" id="sopralluogo-selector"></div>';
  }
  const c = $('sopralluogo-selector');
  c.innerHTML = state.sopralluoghi.map(s => `
    <div class="sopr-chip ${s.id === state.currentSoprId ? 'active' : ''}" onclick="switchSopralluogo('${s.id}')">
      <span>${escapeHtml(s.nome)}</span>
      <span class="date">${fmtDate(s.data_sopralluogo)}</span>
    </div>
  `).join('') + '<button class="sopr-add-btn" onclick="openNewSopralluogo(false)">+ Nuovo</button>';
}

async function loadSopralluogo() {
  renderSopralluoghiSelector();

  const { data: piani } = await sb.from('piani')
    .select('*').eq('sopralluogo_id', state.currentSoprId).order('ordine');
  state.piani = piani || [];

  if (state.piani.length && !state.piani.find(p => p.id === state.currentPianoId)) {
    state.currentPianoId = state.piani[0].id;
  } else if (!state.piani.length) {
    state.currentPianoId = null;
  }

  renderPianiTabs();
  await loadPiano();
}

async function switchSopralluogo(id) {
  state.currentSoprId = id;
  state.currentPianoId = null;
  await loadSopralluogo();
}

// ============================================
// NUOVO SOPRALLUOGO
// ============================================
function openNewSopralluogo(isFirst) {
  const suggestedName = isFirst || state.sopralluoghi.length === 0 ? 'Primo sopralluogo' :
    `Sopralluogo #${state.sopralluoghi.length + 1}`;
  $('ns-nome').value = suggestedName;
  $('ns-tipologia').value = 'casa';
  $('ns-tipo-altro').value = '';
  $('ns-altro-wrap').style.display = 'none';
  $('ns-data').value = new Date().toISOString().split('T')[0];
  $('ns-note').value = '';
  openModal('modal-new-sopr');
}

function toggleTipoAltro() {
  $('ns-altro-wrap').style.display = $('ns-tipologia').value === 'altro' ? 'block' : 'none';
}

async function saveNewSopralluogo() {
  const nome = $('ns-nome').value.trim();
  if (!nome) { toast('Inserisci il nome', 'error'); return; }
  const tip = $('ns-tipologia').value;
  const payload = {
    cantiere_id: cantiereId,
    nome,
    tipologia_immobile: tip,
    tipologia_altro: tip === 'altro' ? $('ns-tipo-altro').value.trim() : null,
    data_sopralluogo: $('ns-data').value || null,
    note: $('ns-note').value.trim() || null
  };
  showLoader('Creazione…');
  try {
    const { data, error } = await sb.from('sopralluoghi').insert(payload).select().single();
    if (error) throw error;
    closeModal('modal-new-sopr');
    state.sopralluoghi.push(data);
    state.currentSoprId = data.id;
    state.currentPianoId = null;
    toast('Sopralluogo creato', 'success');
    await loadSopralluogo();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

// ============================================
// PIANI
// ============================================
function renderPianiTabs() {
  // ricrea il div se è stato rimosso da renderNoSopralluogo
  const wrap = $('piani-wrap');
  if (!$('piani-tabs')) {
    wrap.innerHTML = '<div class="piani-tabs" id="piani-tabs"></div>';
  }
  const c = $('piani-tabs');
  c.innerHTML = state.piani.map(p => `
    <div class="piano-tab ${p.id === state.currentPianoId ? 'active' : ''}" onclick="switchPiano('${p.id}')" ondblclick="openRenamePiano('${p.id}')">
      <span>${escapeHtml(p.nome)}</span>
    </div>
  `).join('') + '<button class="piano-add-btn" onclick="openNewPiano()">+ Piano</button>';
}

function openNewPiano() {
  $('np-nome').value = '';
  $('np-file').value = '';
  openModal('modal-new-piano');
  setTimeout(() => $('np-nome').focus(), 100);
}

async function saveNewPiano() {
  const nome = $('np-nome').value.trim();
  if (!nome) { toast('Inserisci il nome del piano', 'error'); return; }
  const file = $('np-file').files[0];

  showLoader('Creazione piano…');
  try {
    let pianoData = {
      sopralluogo_id: state.currentSoprId,
      nome,
      ordine: state.piani.length
    };

    const { data: piano, error } = await sb.from('piani').insert(pianoData).select().single();
    if (error) throw error;

    if (file) {
      await uploadPiantinaToPiano(piano.id, file);
    }

    closeModal('modal-new-piano');
    state.currentPianoId = piano.id;
    toast('Piano creato', 'success');
    await loadSopralluogo();
  } catch (err) { toast('Errore: ' + err.message, 'error'); console.error(err); }
  finally { hideLoader(); }
}

async function uploadPiantinaToPiano(pianoId, file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const tipo = ext === 'pdf' ? 'pdf' : 'image';
  // sanitizzo il nome file: rimuovo accenti, spazi, caratteri speciali
  const safeName = file.name
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')  // rimuovo accenti
    .replace(/[^a-zA-Z0-9._-]/g, '_');  // solo caratteri sicuri
  const path = `${cantiereId}/${pianoId}_${Date.now()}_${safeName}`;
  const { error: upErr } = await sb.storage.from('sopralluoghi-piantine').upload(path, file);
  if (upErr) {
    // messaggio più chiaro se il bucket manca
    if (upErr.message && (upErr.message.includes('Bucket not found') || upErr.statusCode === '404' || upErr.statusCode === '400')) {
      throw new Error('Bucket "sopralluoghi-piantine" mancante su Supabase. Crealo su Storage → New bucket, Public.');
    }
    throw upErr;
  }

  // dimensioni
  let w = 0, h = 0;
  if (tipo === 'image') {
    const dim = await getImageDimensions(file);
    w = dim.w; h = dim.h;
  } else {
    const dim = await getPdfDimensions(file);
    w = dim.w; h = dim.h;
  }

  await sb.from('piani').update({
    piantina_path: path,
    piantina_tipo: tipo,
    piantina_w: w,
    piantina_h: h
  }).eq('id', pianoId);
}

function getImageDimensions(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res({ w: img.naturalWidth, h: img.naturalHeight });
    img.onerror = rej;
    img.src = URL.createObjectURL(file);
  });
}

async function getPdfDimensions(file) {
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const page = await pdf.getPage(1);
  const vp = page.getViewport({ scale: 1 });
  return { w: Math.round(vp.width), h: Math.round(vp.height) };
}

async function switchPiano(id) {
  state.currentPianoId = id;
  state.measureStart = null;
  state.tool = 'marker';
  renderPianiTabs();
  await loadPiano();
}

function openRenamePiano(id) {
  const p = state.piani.find(x => x.id === id);
  if (!p) return;
  state.currentPianoId = id;
  $('rp-nome').value = p.nome;
  $('rp-file').value = '';
  openModal('modal-rename-piano');
}

async function saveRenamePiano() {
  const nome = $('rp-nome').value.trim();
  if (!nome) { toast('Inserisci il nome', 'error'); return; }
  const file = $('rp-file').files[0];

  showLoader('Salvataggio…');
  try {
    await sb.from('piani').update({ nome }).eq('id', state.currentPianoId);
    if (file) await uploadPiantinaToPiano(state.currentPianoId, file);
    closeModal('modal-rename-piano');
    toast('Aggiornato', 'success');
    await loadSopralluogo();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

async function deletePiano() {
  if (!confirm('Eliminare questo piano e tutti i suoi punti/misure?')) return;
  showLoader('Eliminazione…');
  try {
    await sb.from('piani').delete().eq('id', state.currentPianoId);
    closeModal('modal-rename-piano');
    toast('Piano eliminato');
    state.currentPianoId = null;
    await loadSopralluogo();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

// ============================================
// CARICAMENTO PIANO + MARKER + MISURE
// ============================================
async function loadPiano() {
  if (!state.currentPianoId) {
    if (state.piani.length === 0) {
      renderNoPiano();
    }
    return;
  }

  const piano = state.piani.find(p => p.id === state.currentPianoId);
  if (!piano) return;

  // marker e misure
  const [{data: m}, {data: mis}] = await Promise.all([
    sb.from('marker').select('*').eq('piano_id', piano.id).order('numero'),
    sb.from('misure_linee').select('*').eq('piano_id', piano.id)
  ]);
  state.marker = m || [];
  state.misure = mis || [];

  renderToolbar();
  renderStatusBar();
  renderCanvas(piano);
}

function renderNoPiano() {
  $('toolbar-wrap').innerHTML = '';
  $('status-bar-wrap').innerHTML = '';
  $('canvas-wrap').innerHTML = `
    <div class="empty-state">
      <div class="ic">📐</div>
      <h3>Nessun <em>piano</em></h3>
      <p>Aggiungi almeno un piano per iniziare il rilievo</p>
      <button class="btn" onclick="openNewPiano()">+ Aggiungi piano</button>
    </div>
  `;
}

function renderToolbar() {
  if (!state.currentPianoId) { $('toolbar-wrap').innerHTML = ''; return; }
  $('toolbar-wrap').innerHTML = `
    <div class="toolbar">
      <button class="tool-btn ${state.tool==='marker'?'active':''}" onclick="setTool('marker')">📍 Punto foto</button>
      <button class="tool-btn ${state.tool==='measure'?'active':''}" onclick="setTool('measure')">📏 Misura</button>
      <button class="tool-btn" onclick="openRenamePiano('${state.currentPianoId}')">⚙️ Piano</button>
    </div>
  `;
}

function renderStatusBar() {
  if (state.tool === 'measure' && state.measureStart) {
    $('status-bar-wrap').innerHTML = `
      <div class="status-bar">
        <span>📏 Tap sul secondo punto per completare la misura</span>
        <button onclick="cancelMeasurePending()">Annulla</button>
      </div>
    `;
  } else if (state.tool === 'measure') {
    $('status-bar-wrap').innerHTML = `
      <div class="status-bar">
        <span>📏 Tap sul primo punto sulla piantina</span>
        <button onclick="setTool('marker')">Esci</button>
      </div>
    `;
  } else {
    $('status-bar-wrap').innerHTML = '';
  }
}

function setTool(tool) {
  state.tool = tool;
  state.measureStart = null;
  renderToolbar();
  renderStatusBar();
  renderCanvas(state.piani.find(p => p.id === state.currentPianoId));
}

function cancelMeasurePending() {
  state.measureStart = null;
  renderStatusBar();
  renderCanvas(state.piani.find(p => p.id === state.currentPianoId));
}

function renderCanvas(piano) {
  const c = $('canvas-wrap');
  if (!piano) { c.innerHTML = ''; return; }

  if (!piano.piantina_path) {
    c.innerHTML = `
      <div class="canvas-empty">
        <div class="ic">🗺️</div>
        <h3>${escapeHtml(piano.nome)}</h3>
        <p>Nessuna piantina caricata per questo piano</p>
        <button class="btn" onclick="openRenamePiano('${piano.id}')">📎 Carica piantina</button>
      </div>
    `;
    return;
  }

  // rendering diverso per img/pdf
  if (piano.piantina_tipo === 'image') {
    const url = getStorageUrl('sopralluoghi-piantine', piano.piantina_path);
    c.innerHTML = `
      <div class="canvas-wrap">
        <div class="canvas-scroll" id="canvas-scroll">
          <div class="canvas-inner" id="canvas-inner">
            <img src="${url}" id="piantina-img" onload="onImageLoaded()">
            <div class="canvas-overlay" id="canvas-overlay"></div>
            <svg class="measure-svg" id="measure-svg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
        <div class="zoom-indicator" id="zoom-indicator">100%</div>
        <div class="zoom-ctrl">
          <button type="button" onclick="zoomBy(1.3)" title="Zoom in">+</button>
          <div class="divider"></div>
          <button type="button" onclick="zoomBy(1/1.3)" title="Zoom out">−</button>
          <div class="divider"></div>
          <button type="button" onclick="zoomReset()" title="Reset" style="font-size:11px;font-family:'JetBrains Mono',monospace;">1:1</button>
        </div>
      </div>
    `;
    initZoom();
  } else {
    // PDF -> canvas
    c.innerHTML = `
      <div class="canvas-wrap">
        <div class="canvas-scroll" id="canvas-scroll">
          <div class="canvas-inner" id="canvas-inner">
            <canvas id="pdf-canvas"></canvas>
            <div class="canvas-overlay" id="canvas-overlay"></div>
            <svg class="measure-svg" id="measure-svg" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
        <div class="zoom-indicator" id="zoom-indicator">100%</div>
        <div class="zoom-ctrl">
          <button type="button" onclick="zoomBy(1.3)" title="Zoom in">+</button>
          <div class="divider"></div>
          <button type="button" onclick="zoomBy(1/1.3)" title="Zoom out">−</button>
          <div class="divider"></div>
          <button type="button" onclick="zoomReset()" title="Reset" style="font-size:11px;font-family:'JetBrains Mono',monospace;">1:1</button>
        </div>
      </div>
    `;
    renderPDF(piano);
    initZoom();
  }
}

async function renderPDF(piano) {
  try {
    const url = getStorageUrl('sopralluoghi-piantine', piano.piantina_path);
    const pdf = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 2 });
    const canvas = $('pdf-canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    // onImageLoaded manualmente
    setTimeout(onImageLoaded, 50);
  } catch (err) {
    console.error('PDF render error:', err);
    toast('Errore caricamento PDF: ' + err.message, 'error');
  }
}

function onImageLoaded() {
  const inner = $('canvas-inner');
  if (!inner) return;
  const img = inner.querySelector('img') || inner.querySelector('canvas');
  if (!img) return;
  state.imgW = img.clientWidth;
  state.imgH = img.clientHeight;
  const piano = state.piani.find(p => p.id === state.currentPianoId);
  state.natW = piano?.piantina_w || img.naturalWidth || img.width;
  state.natH = piano?.piantina_h || img.naturalHeight || img.height;
  drawMarkersAndMeasures();
}

// ============================================
// DISEGNO MARKER E MISURE SULL'OVERLAY
// ============================================
function drawMarkersAndMeasures() {
  const overlay = $('canvas-overlay');
  if (!overlay) return;

  // rimuovo tutti i marker ma lascio l'overlay
  overlay.querySelectorAll('.marker, .measure-preview').forEach(el => el.remove());

  // MARKER
  state.marker.forEach(m => {
    const el = document.createElement('div');
    el.className = 'marker' + (m.da_completare ? ' todo' : '');
    el.style.left = (m.pos_x * 100) + '%';
    el.style.top = (m.pos_y * 100) + '%';

    // cono visuale SVG
    const coneSvg = makeConeSVG(m.direzione_deg || 0);
    el.innerHTML = coneSvg + `<div class="marker-pin">${m.numero}</div>`;

    el.onclick = (e) => { e.stopPropagation(); editMarker(m); };
    overlay.appendChild(el);
  });

  // misura pending (primo punto)
  if (state.measureStart) {
    const dot = document.createElement('div');
    dot.className = 'measure-preview';
    dot.style.left = (state.measureStart.x * 100) + '%';
    dot.style.top = (state.measureStart.y * 100) + '%';
    overlay.appendChild(dot);
  }

  // MISURE SVG
  drawMeasuresSVG();
}

function makeConeSVG(deg) {
  // Cono di 60° che parte esattamente dal CENTRO del marker (origin 0,0)
  // e punta nella direzione indicata (0° = nord, 90° = est)
  const size = 80;
  return `
    <svg width="${size*2}" height="${size*2}" style="position:absolute; top:-${size}px; left:-${size}px; pointer-events:none; z-index:-1; overflow:visible;">
      <defs>
        <linearGradient id="coneGrad-${deg}" x1="0%" y1="50%" x2="100%" y2="50%">
          <stop offset="0%"   stop-color="rgba(201,167,111,0.7)"/>
          <stop offset="100%" stop-color="rgba(201,167,111,0)"/>
        </linearGradient>
      </defs>
      <g transform="translate(${size},${size}) rotate(${deg-90})">
        <!-- il cono parte dall'origine (0,0) che è il centro del marker -->
        <path d="M 0 0 L 70 -40 A 81 81 0 0 1 70 40 Z"
              fill="url(#coneGrad-${deg})"
              stroke="rgba(201,167,111,0.85)"
              stroke-width="1"/>
      </g>
    </svg>
  `;
}

function drawMeasuresSVG() {
  const svg = $('measure-svg');
  if (!svg) return;
  const w = state.imgW || 1, h = state.imgH || 1;
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
  svg.style.width = '100%';
  svg.style.height = '100%';

  svg.innerHTML = state.misure.map(m => {
    const x1 = m.pos_x1 * w, y1 = m.pos_y1 * h;
    const x2 = m.pos_x2 * w, y2 = m.pos_y2 * h;
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const label = (m.etichetta ? m.etichetta + ': ' : '') + m.valore + ' ' + m.unita;
    return `
      <line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />
      <circle cx="${x1}" cy="${y1}" r="5" />
      <circle cx="${x2}" cy="${y2}" r="5" />
      <text x="${mx}" y="${my - 6}" text-anchor="middle" style="cursor:pointer" onclick="deleteMisura('${m.id}')">${escapeHtml(label)}</text>
    `;
  }).join('');
}

// ============================================
// ZOOM & PAN SULLA PIANTINA
// ============================================
const zoomState = {
  scale: 1,
  minScale: 1,
  maxScale: 6,
  offsetX: 0,
  offsetY: 0,
  // gesture tracking
  isPanning: false,
  isPinching: false,
  panStartX: 0,
  panStartY: 0,
  pinchStartDist: 0,
  pinchStartScale: 1,
  pinchCenterX: 0,
  pinchCenterY: 0,
  // distinzione tap/drag
  touchStartTime: 0,
  touchStartX: 0,
  touchStartY: 0,
  moved: false,
};

function initZoom() {
  const scroll = $('canvas-scroll');
  const overlay = $('canvas-overlay');
  if (!scroll || !overlay) return;

  zoomState.scale = 1;
  zoomState.offsetX = 0;
  zoomState.offsetY = 0;
  applyZoomTransform();

  // TOUCH events (mobile: pinch + pan + tap)
  overlay.addEventListener('touchstart', onTouchStart, { passive: false });
  overlay.addEventListener('touchmove', onTouchMove, { passive: false });
  overlay.addEventListener('touchend', onTouchEnd, { passive: false });
  overlay.addEventListener('touchcancel', onTouchEnd, { passive: false });

  // MOUSE events (desktop: click, drag con tasto premuto se già zoomato)
  overlay.addEventListener('mousedown', onMouseDown);
  overlay.addEventListener('mousemove', onMouseMove);
  overlay.addEventListener('mouseup', onMouseUp);
  overlay.addEventListener('mouseleave', onMouseUp);

  // WHEEL (desktop: Ctrl/Cmd + rotella = zoom)
  overlay.addEventListener('wheel', onWheel, { passive: false });
}

function applyZoomTransform() {
  const inner = $('canvas-inner');
  if (!inner) return;
  inner.style.transform = `translate(${zoomState.offsetX}px, ${zoomState.offsetY}px) scale(${zoomState.scale})`;

  // mostro indicatore
  const ind = $('zoom-indicator');
  if (ind) {
    ind.textContent = Math.round(zoomState.scale * 100) + '%';
    ind.classList.add('visible');
    clearTimeout(applyZoomTransform._t);
    applyZoomTransform._t = setTimeout(() => ind.classList.remove('visible'), 1000);
  }
}

function clampOffsets() {
  const scroll = $('canvas-scroll');
  const inner = $('canvas-inner');
  if (!scroll || !inner) return;
  const rect = scroll.getBoundingClientRect();
  const iw = inner.offsetWidth * zoomState.scale;
  const ih = inner.offsetHeight * zoomState.scale;
  // quanto spazio c'è per far scorrere: max in X = 0, min = -(iw - rect.width)
  const minX = Math.min(0, rect.width - iw);
  const minY = Math.min(0, rect.height - ih);
  const maxX = 0;
  const maxY = 0;
  // se l'immagine è più piccola del container, centro
  if (iw <= rect.width) {
    zoomState.offsetX = (rect.width - iw) / 2;
  } else {
    zoomState.offsetX = Math.max(minX, Math.min(maxX, zoomState.offsetX));
  }
  if (ih <= rect.height) {
    zoomState.offsetY = (rect.height - ih) / 2;
  } else {
    zoomState.offsetY = Math.max(minY, Math.min(maxY, zoomState.offsetY));
  }
}

window.zoomBy = function(factor) {
  zoomAtPoint(factor, null, null);
};
window.zoomReset = function() {
  const inner = $('canvas-inner');
  if (inner) inner.classList.remove('panning');
  zoomState.scale = 1;
  zoomState.offsetX = 0;
  zoomState.offsetY = 0;
  clampOffsets();
  applyZoomTransform();
};

function zoomAtPoint(factor, cx, cy) {
  const scroll = $('canvas-scroll');
  const inner = $('canvas-inner');
  if (!scroll || !inner) return;
  const newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, zoomState.scale * factor));
  const actualFactor = newScale / zoomState.scale;

  if (cx === null || cy === null) {
    // zoom dal centro del viewport
    const rect = scroll.getBoundingClientRect();
    cx = rect.width / 2;
    cy = rect.height / 2;
  }

  // aggiusta offset per mantenere il punto cx/cy fermo durante lo zoom
  zoomState.offsetX = cx - (cx - zoomState.offsetX) * actualFactor;
  zoomState.offsetY = cy - (cy - zoomState.offsetY) * actualFactor;
  zoomState.scale = newScale;

  clampOffsets();
  applyZoomTransform();
}

// ==== TOUCH ====
function onTouchStart(e) {
  // se il touch inizia su un marker esistente, non gestirlo come pan/nuovo punto
  if (e.target.closest && e.target.closest('.marker')) {
    zoomState.touchOnMarker = true;
    return;
  }
  zoomState.touchOnMarker = false;
  if (e.touches.length === 1) {
    // inizio di un singolo tocco: potrebbe essere tap o drag
    const scroll = $('canvas-scroll');
    const rect = scroll.getBoundingClientRect();
    zoomState.touchStartTime = Date.now();
    zoomState.touchStartX = e.touches[0].clientX - rect.left;
    zoomState.touchStartY = e.touches[0].clientY - rect.top;
    zoomState.panStartX = zoomState.offsetX;
    zoomState.panStartY = zoomState.offsetY;
    zoomState.isPanning = zoomState.scale > 1;  // pan solo se zoomato
    zoomState.isPinching = false;
    zoomState.moved = false;
    if (zoomState.isPanning) {
      $('canvas-inner').classList.add('panning');
      e.preventDefault();
    }
  } else if (e.touches.length === 2) {
    // pinch: calcolo distanza e centro
    e.preventDefault();
    zoomState.isPinching = true;
    zoomState.isPanning = false;
    zoomState.pinchStartDist = touchDistance(e.touches[0], e.touches[1]);
    zoomState.pinchStartScale = zoomState.scale;
    const scroll = $('canvas-scroll');
    const rect = scroll.getBoundingClientRect();
    zoomState.pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX)/2 - rect.left;
    zoomState.pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY)/2 - rect.top;
    zoomState.pinchOffsetX = zoomState.offsetX;
    zoomState.pinchOffsetY = zoomState.offsetY;
    $('canvas-inner').classList.add('panning');
  }
}

function onTouchMove(e) {
  if (zoomState.touchOnMarker) return;
  if (zoomState.isPinching && e.touches.length === 2) {
    e.preventDefault();
    const dist = touchDistance(e.touches[0], e.touches[1]);
    const ratio = dist / zoomState.pinchStartDist;
    const newScale = Math.max(zoomState.minScale, Math.min(zoomState.maxScale, zoomState.pinchStartScale * ratio));
    const actualRatio = newScale / zoomState.pinchStartScale;
    // pivot su pinchCenter
    zoomState.offsetX = zoomState.pinchCenterX - (zoomState.pinchCenterX - zoomState.pinchOffsetX) * actualRatio;
    zoomState.offsetY = zoomState.pinchCenterY - (zoomState.pinchCenterY - zoomState.pinchOffsetY) * actualRatio;
    zoomState.scale = newScale;
    clampOffsets();
    applyZoomTransform();
    zoomState.moved = true;
  } else if (zoomState.isPanning && e.touches.length === 1) {
    const scroll = $('canvas-scroll');
    const rect = scroll.getBoundingClientRect();
    const dx = (e.touches[0].clientX - rect.left) - zoomState.touchStartX;
    const dy = (e.touches[0].clientY - rect.top) - zoomState.touchStartY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) zoomState.moved = true;
    zoomState.offsetX = zoomState.panStartX + dx;
    zoomState.offsetY = zoomState.panStartY + dy;
    clampOffsets();
    applyZoomTransform();
    e.preventDefault();
  } else if (e.touches.length === 1 && !zoomState.isPinching) {
    // tracking movimento per distinguere tap da scroll vero
    const scroll = $('canvas-scroll');
    const rect = scroll.getBoundingClientRect();
    const dx = Math.abs((e.touches[0].clientX - rect.left) - zoomState.touchStartX);
    const dy = Math.abs((e.touches[0].clientY - rect.top) - zoomState.touchStartY);
    if (dx > 8 || dy > 8) zoomState.moved = true;
  }
}

function onTouchEnd(e) {
  if (zoomState.touchOnMarker) {
    zoomState.touchOnMarker = false;
    return;
  }
  $('canvas-inner')?.classList.remove('panning');
  const duration = Date.now() - zoomState.touchStartTime;
  const wasTap = !zoomState.moved && duration < 400 && !zoomState.isPinching;

  if (wasTap && e.changedTouches.length > 0) {
    // tap: calcolo coordinate relative all'immagine tenendo conto dello zoom
    handleTapAt(zoomState.touchStartX, zoomState.touchStartY);
  }
  zoomState.isPanning = false;
  zoomState.isPinching = false;
  zoomState.moved = false;
}

function touchDistance(a, b) {
  const dx = a.clientX - b.clientX;
  const dy = a.clientY - b.clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

// ==== MOUSE (desktop) ====
function onMouseDown(e) {
  if (e.target.closest && e.target.closest('.marker')) {
    zoomState.touchOnMarker = true;
    return;
  }
  zoomState.touchOnMarker = false;
  const scroll = $('canvas-scroll');
  const rect = scroll.getBoundingClientRect();
  zoomState.touchStartTime = Date.now();
  zoomState.touchStartX = e.clientX - rect.left;
  zoomState.touchStartY = e.clientY - rect.top;
  zoomState.panStartX = zoomState.offsetX;
  zoomState.panStartY = zoomState.offsetY;
  zoomState.moved = false;
  // pan solo se zoomato + tasto destro O shift+click O semplicemente drag se già zoomato
  zoomState.isPanning = zoomState.scale > 1 && (e.button === 0);
  if (zoomState.isPanning) {
    $('canvas-inner').classList.add('panning');
    e.preventDefault();
  }
}
function onMouseMove(e) {
  if (!zoomState.isPanning) return;
  const scroll = $('canvas-scroll');
  const rect = scroll.getBoundingClientRect();
  const dx = (e.clientX - rect.left) - zoomState.touchStartX;
  const dy = (e.clientY - rect.top) - zoomState.touchStartY;
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) zoomState.moved = true;
  zoomState.offsetX = zoomState.panStartX + dx;
  zoomState.offsetY = zoomState.panStartY + dy;
  clampOffsets();
  applyZoomTransform();
}
function onMouseUp(e) {
  if (zoomState.touchOnMarker) {
    zoomState.touchOnMarker = false;
    $('canvas-inner')?.classList.remove('panning');
    return;
  }
  $('canvas-inner')?.classList.remove('panning');
  const duration = Date.now() - zoomState.touchStartTime;
  const wasClick = !zoomState.moved && duration < 400;
  if (wasClick && e.type === 'mouseup') {
    const scroll = $('canvas-scroll');
    const rect = scroll.getBoundingClientRect();
    handleTapAt(e.clientX - rect.left, e.clientY - rect.top);
  }
  zoomState.isPanning = false;
  zoomState.moved = false;
}
function onWheel(e) {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  const scroll = $('canvas-scroll');
  const rect = scroll.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.15 : 1/1.15;
  zoomAtPoint(factor, cx, cy);
}

// Tap → apre nuovo marker / misura (coordinate normalizzate sulla piantina)
function handleTapAt(screenX, screenY) {
  const inner = $('canvas-inner');
  if (!inner) return;
  const imgW = inner.offsetWidth;
  const imgH = inner.offsetHeight;
  if (imgW === 0 || imgH === 0) return;

  // converto coordinate schermo → coordinate immagine originale (0-1)
  const ix = (screenX - zoomState.offsetX) / zoomState.scale;
  const iy = (screenY - zoomState.offsetY) / zoomState.scale;
  const x = ix / imgW;
  const y = iy / imgH;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;

  if (state.tool === 'marker') {
    state.pendingMarkerPos = { x, y };
    state.editingMarker = null;
    openNewMarker();
  } else if (state.tool === 'measure') {
    if (!state.measureStart) {
      state.measureStart = { x, y };
      renderStatusBar();
      drawMarkersAndMeasures();
    } else {
      state.measureEnd = { x, y };
      openMeasureModal();
    }
  }
}

// ============================================
// CLICK SULLA PIANTINA
// ============================================
function onCanvasClick(e) {
  const overlay = e.currentTarget;
  const rect = overlay.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;

  if (state.tool === 'marker') {
    // nuovo marker
    state.pendingMarkerPos = { x, y };
    state.editingMarker = null;
    openNewMarker();
  } else if (state.tool === 'measure') {
    if (!state.measureStart) {
      state.measureStart = { x, y };
      renderStatusBar();
      drawMarkersAndMeasures();
    } else {
      // secondo punto
      state.measureEnd = { x, y };
      openMeasureModal();
    }
  }
}

// ============================================
// MARKER CRUD
// ============================================
function openNewMarker() {
  $('marker-title').innerHTML = `Punto <em>#${state.marker.length + 1}</em>`;
  $('m-delete-btn').style.display = 'none';
  $('m-misure').value = '';
  $('m-note').value = '';
  $('m-todo').checked = false;
  state.direzione = 0;
  state.pendingPhotos = [];
  updateCompass();
  renderPhotoList();
  openModal('modal-marker');
}

function editMarker(m) {
  state.editingMarker = m;
  state.pendingMarkerPos = { x: m.pos_x, y: m.pos_y };
  $('marker-title').innerHTML = `Punto <em>#${m.numero}</em>`;
  $('m-delete-btn').style.display = 'inline-block';
  $('m-misure').value = m.misure_testo || '';
  $('m-note').value = m.note || '';
  $('m-todo').checked = !!m.da_completare;
  state.direzione = m.direzione_deg || 0;
  state.pendingPhotos = (m.foto_paths || []).map(p => ({ kind: 'existing', path: p }));
  updateCompass();
  renderPhotoList();
  openModal('modal-marker');
}

function cancelMarker() {
  state.pendingMarkerPos = null;
  state.editingMarker = null;
  state.pendingPhotos = [];
  closeModal('modal-marker');
}

async function saveMarker() {
  if (!state.pendingMarkerPos) return;
  showLoader('Salvataggio…');
  try {
    // upload foto nuove
    const fotoPaths = [];
    for (const p of state.pendingPhotos) {
      if (p.kind === 'existing') {
        fotoPaths.push(p.path);
      } else if (p.kind === 'new') {
        const ts = Date.now() + '_' + Math.random().toString(36).substr(2,6);
        const safeName = p.file.name
          .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
          .replace(/[^a-zA-Z0-9._-]/g, '_');
        const path = `${cantiereId}/${state.currentPianoId}/${ts}_${safeName}`;
        const { error } = await sb.storage.from('sopralluoghi-foto').upload(path, p.file);
        if (!error) fotoPaths.push(path);
      }
    }

    const payload = {
      piano_id: state.currentPianoId,
      pos_x: state.pendingMarkerPos.x,
      pos_y: state.pendingMarkerPos.y,
      direzione_deg: state.direzione,
      foto_paths: fotoPaths,
      note: $('m-note').value.trim() || null,
      misure_testo: $('m-misure').value.trim() || null,
      da_completare: $('m-todo').checked
    };

    if (state.editingMarker) {
      await sb.from('marker').update(payload).eq('id', state.editingMarker.id);
    } else {
      payload.numero = state.marker.length + 1;
      await sb.from('marker').insert(payload);
    }

    closeModal('modal-marker');
    toast('Punto salvato', 'success');
    state.pendingMarkerPos = null;
    state.editingMarker = null;
    state.pendingPhotos = [];
    await loadPiano();
  } catch (err) { toast('Errore: ' + err.message, 'error'); console.error(err); }
  finally { hideLoader(); }
}

async function deleteMarker() {
  if (!state.editingMarker) return;
  if (!confirm('Eliminare questo punto?')) return;
  showLoader('Eliminazione…');
  try {
    // cancella le foto dallo storage
    if (state.editingMarker.foto_paths && state.editingMarker.foto_paths.length) {
      await sb.storage.from('sopralluoghi-foto').remove(state.editingMarker.foto_paths);
    }
    await sb.from('marker').delete().eq('id', state.editingMarker.id);
    // rinumera i marker successivi
    const remaining = state.marker.filter(m => m.id !== state.editingMarker.id);
    for (let i = 0; i < remaining.length; i++) {
      if (remaining[i].numero !== i + 1) {
        await sb.from('marker').update({ numero: i + 1 }).eq('id', remaining[i].id);
      }
    }
    closeModal('modal-marker');
    state.editingMarker = null;
    toast('Punto eliminato');
    await loadPiano();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

// ============================================
// PHOTO HANDLING
// ============================================
$('photo-camera').onchange = handlePhotoFiles;
$('photo-gallery').onchange = handlePhotoFiles;

function handlePhotoFiles(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => state.pendingPhotos.push({ kind: 'new', file: f }));
  e.target.value = '';
  renderPhotoList();
}

function renderPhotoList() {
  const c = $('photo-list');
  $('photo-count').textContent = `(${state.pendingPhotos.length})`;
  c.innerHTML = state.pendingPhotos.map((p, i) => {
    const src = p.kind === 'existing' ? getStorageUrl('sopralluoghi-foto', p.path) : URL.createObjectURL(p.file);
    return `
      <div class="photo-thumb">
        <img src="${src}" onclick="window.open('${src}','_blank')" style="cursor:pointer;">
        <button class="rm" onclick="removePhoto(${i})">✕</button>
      </div>
    `;
  }).join('');
}

function removePhoto(i) {
  state.pendingPhotos.splice(i, 1);
  renderPhotoList();
}

// ============================================
// COMPASS (cono direzionale ruotabile)
// ============================================
function updateCompass() {
  $('compass-arrow').style.transform = `translate(0, -1px) rotate(${state.direzione - 90}deg)`;
  $('dir-deg').textContent = state.direzione;
  $('dir-label').textContent = degToLabel(state.direzione);

  // cono
  const cone = $('compass-cone');
  cone.innerHTML = `
    <svg width="140" height="140" style="position:absolute; top:-70px; left:-70px; pointer-events:none;">
      <g transform="translate(70,70) rotate(${state.direzione-90})">
        <path d="M 0 0 L 55 -35 A 65 65 0 0 1 55 35 Z" fill="rgba(201,167,111,0.25)" stroke="rgba(201,167,111,0.6)" stroke-width="1"/>
      </g>
    </svg>
  `;
}

function setupCompass() {
  const comp = $('compass');
  let dragging = false;

  function getAngle(e) {
    const rect = comp.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const dx = clientX - cx;
    const dy = clientY - cy;
    let rad = Math.atan2(dy, dx);
    let deg = rad * 180 / Math.PI + 90; // 0=Nord
    if (deg < 0) deg += 360;
    return Math.round(deg);
  }

  function onStart(e) {
    dragging = true;
    state.direzione = getAngle(e);
    updateCompass();
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    state.direzione = getAngle(e);
    updateCompass();
    e.preventDefault();
  }
  function onEnd() { dragging = false; }

  comp.addEventListener('mousedown', onStart);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onEnd);
  comp.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onEnd);
}

// ============================================
// MISURE
// ============================================
function openMeasureModal() {
  $('me-val').value = '';
  $('me-unit').value = 'm';
  $('me-etichetta').value = '';
  openModal('modal-measure');
  setTimeout(() => $('me-val').focus(), 100);
}

async function saveMeasure() {
  const val = parseFloat($('me-val').value);
  if (isNaN(val) || val <= 0) { toast('Inserisci un valore valido', 'error'); return; }
  showLoader('Salvataggio…');
  try {
    await sb.from('misure_linee').insert({
      piano_id: state.currentPianoId,
      pos_x1: state.measureStart.x,
      pos_y1: state.measureStart.y,
      pos_x2: state.measureEnd.x,
      pos_y2: state.measureEnd.y,
      valore: val,
      unita: $('me-unit').value,
      etichetta: $('me-etichetta').value.trim() || null
    });
    closeModal('modal-measure');
    state.measureStart = null;
    state.measureEnd = null;
    toast('Misura salvata', 'success');
    await loadPiano();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

function cancelMeasure() {
  closeModal('modal-measure');
  state.measureStart = null;
  state.measureEnd = null;
  renderStatusBar();
  drawMarkersAndMeasures();
}

async function deleteMisura(id) {
  if (!confirm('Eliminare questa misura?')) return;
  await sb.from('misure_linee').delete().eq('id', id);
  toast('Misura eliminata');
  await loadPiano();
}

// ============================================
// EXPORT PDF
// ============================================
async function exportPDF() {
  if (!state.currentSoprId) { toast('Nessun sopralluogo', 'error'); return; }
  const sopr = state.sopralluoghi.find(s => s.id === state.currentSoprId);
  if (!sopr) return;
  if (state.piani.length === 0) { toast('Nessun piano da esportare', 'error'); return; }

  showLoader('Generazione PDF…');
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });

    // COVER
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(22);
    doc.setTextColor(139, 111, 71);
    doc.text('SOPRALLUOGO', 105, 30, { align: 'center' });
    doc.setFontSize(11);
    doc.setTextColor(100);
    doc.setFont('helvetica', 'normal');
    doc.text('Studio Pizzone · Architetto', 105, 38, { align: 'center' });

    doc.setFontSize(16);
    doc.setTextColor(0);
    doc.setFont('helvetica', 'bold');
    doc.text(state.cantiere.nome || '', 105, 55, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10);
    let y = 65;
    if (state.cantiere.cliente) { doc.text('Cliente: ' + state.cantiere.cliente, 105, y, {align:'center'}); y += 5; }
    if (state.cantiere.indirizzo) { doc.text('Indirizzo: ' + state.cantiere.indirizzo, 105, y, {align:'center'}); y += 5; }
    doc.text('Sopralluogo: ' + sopr.nome, 105, y, {align:'center'}); y += 5;
    doc.text('Data: ' + fmtDate(sopr.data_sopralluogo), 105, y, {align:'center'}); y += 5;

    // Per ogni piano
    for (const piano of state.piani) {
      const { data: mk } = await sb.from('marker').select('*').eq('piano_id', piano.id).order('numero');
      const { data: mi } = await sb.from('misure_linee').select('*').eq('piano_id', piano.id);

      doc.addPage();
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(16);
      doc.setTextColor(139, 111, 71);
      doc.text(piano.nome, 14, 20);

      let yc = 30;

      // piantina con annotazioni: screenshot del DOM è complesso, metto solo descrittivo
      if (piano.piantina_path && piano.piantina_tipo === 'image') {
        try {
          const url = getStorageUrl('sopralluoghi-piantine', piano.piantina_path);
          const resp = await fetch(url);
          const blob = await resp.blob();
          const dataUrl = await blobToDataUrl(blob);
          doc.addImage(dataUrl, 'JPEG', 14, yc, 182, 120, undefined, 'FAST');
          yc += 125;
        } catch(e) { console.warn('Impossibile includere piantina:', e); }
      }

      // Elenco punti
      if ((mk || []).length) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.setTextColor(0);
        if (yc > 260) { doc.addPage(); yc = 20; }
        doc.text('Punti di rilievo', 14, yc);
        yc += 6;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);

        for (const m of mk) {
          if (yc > 265) { doc.addPage(); yc = 20; }
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(139, 111, 71);
          doc.text(`#${m.numero}`, 14, yc);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(0);
          doc.text(`Direzione: ${m.direzione_deg}° (${degToLabel(m.direzione_deg)})`, 25, yc);
          yc += 4;
          if (m.note) {
            const noteLines = doc.splitTextToSize('Note: ' + m.note, 175);
            doc.text(noteLines, 25, yc);
            yc += noteLines.length * 4;
          }
          if (m.misure_testo) {
            const misLines = doc.splitTextToSize('Misure: ' + m.misure_testo, 175);
            doc.text(misLines, 25, yc);
            yc += misLines.length * 4;
          }
          if (m.foto_paths && m.foto_paths.length) {
            doc.setFontSize(8);
            doc.setTextColor(100);
            doc.text(`${m.foto_paths.length} foto allegate`, 25, yc);
            doc.setFontSize(9);
            doc.setTextColor(0);
            yc += 4;
          }
          if (m.da_completare) {
            doc.setTextColor(230, 179, 74);
            doc.text('⚠ Da completare', 25, yc);
            doc.setTextColor(0);
            yc += 4;
          }
          yc += 2;
        }
      }

      // Misure
      if ((mi || []).length) {
        if (yc > 260) { doc.addPage(); yc = 20; }
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(11);
        doc.text('Misure lineari', 14, yc);
        yc += 6;
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        for (const mis of mi) {
          if (yc > 270) { doc.addPage(); yc = 20; }
          const label = (mis.etichetta ? mis.etichetta + ': ' : '') + mis.valore + ' ' + mis.unita;
          doc.text('• ' + label, 14, yc);
          yc += 4;
        }
      }
    }

    const fileName = `Sopralluogo_${state.cantiere.nome.replace(/\s+/g,'_')}_${sopr.nome.replace(/\s+/g,'_')}.pdf`;
    doc.save(fileName);
    toast('PDF esportato', 'success');
  } catch (err) { toast('Errore PDF: ' + err.message, 'error'); console.error(err); }
  finally { hideLoader(); }
}

function blobToDataUrl(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}
