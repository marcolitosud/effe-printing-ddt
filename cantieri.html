<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1410">
<title>Cantieri — Studio Pizzone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410;
    --bg-soft: #221b15;
    --bg-card: rgba(245, 241, 232, 0.06);
    --bg-card-hover: rgba(245, 241, 232, 0.1);
    --border: rgba(245, 241, 232, 0.14);
    --border-hover: rgba(201, 167, 111, 0.55);
    --ivory: #fbf8f0;
    --ivory-soft: #e8e0cc;
    --ivory-muted: rgba(251, 248, 240, 0.75);
    --ivory-faint: rgba(251, 248, 240, 0.5);
    --terra: #c9a76f;
    --terra-soft: #b8935f;
    --accent: #d9ba85;
    --green: #7fb069;
    --yellow: #e6b34a;
    --red: #d4675b;
    --blue: #6ba3d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(26, 20, 16, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 18px;
  }
  .back-btn:active { transform: scale(0.94); }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    flex: 1;
    letter-spacing: -0.005em;
  }
  .topbar-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .add-btn {
    background: var(--terra);
    color: var(--bg);
    border: none;
    width: 40px; height: 40px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-btn:active { transform: scale(0.94); }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 120px;
  }
  @media (min-width: 700px) {
    .container { padding: 32px 24px 120px; }
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat .val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    color: var(--ivory);
    margin-bottom: 4px;
  }

  .stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ivory-muted);
  }

  .stat.corso .val { color: var(--green); }
  .stat.attesa .val { color: var(--yellow); }
  .stat.contratto .val { color: var(--terra); font-size: 18px; }

  .cantieri-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  @media (min-width: 700px) {
    .cantieri-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
  }
  @media (min-width: 1000px) {
    .cantieri-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .cantiere {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .cantiere::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--terra);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s;
  }

  .cantiere:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .cantiere:hover::before { transform: scaleX(1); }
  .cantiere:active { transform: scale(0.99); }

  .cantiere-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }

  .cantiere-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.005em;
  }
  .cantiere-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .cantiere-client {
    font-size: 13px;
    color: var(--ivory-muted);
    margin-bottom: 12px;
  }

  .cantiere-address {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-faint);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .cantiere-stat {
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  .progress-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 10px;
  }

  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--terra);
    line-height: 1;
  }
  .progress-pct em {
    font-style: italic;
    font-size: 0.6em;
    color: var(--ivory-muted);
    margin-left: 2px;
  }

  .progress-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-muted);
    text-align: right;
    line-height: 1.4;
  }
  .progress-amount b { color: var(--green); font-weight: 500; }

  .progress-bar {
    height: 3px;
    background: rgba(245, 241, 232, 0.08);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--terra), var(--accent));
    border-radius: 2px;
  }

  .pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pill-green { background: rgba(127,176,105,0.15); color: var(--green); border: 1px solid rgba(127,176,105,0.3); }
  .pill-yellow { background: rgba(230,179,74,0.15); color: var(--yellow); border: 1px solid rgba(230,179,74,0.3); }
  .pill-grey { background: rgba(245,241,232,0.08); color: var(--ivory-muted); border: 1px solid var(--border); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ivory-muted);
  }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    margin-bottom: 10px;
    color: var(--ivory);
  }
  .empty h3 em { font-style: italic; color: var(--terra); }
  .empty p { font-size: 14px; margin-bottom: 24px; }

  .btn {
    background: var(--terra);
    color: var(--bg);
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
  }
  .btn:hover { background: var(--accent); }
  .btn:active { transform: scale(0.97); }

  .btn-ghost {
    background: var(--bg-card);
    color: var(--ivory);
    border: 1px solid var(--border);
  }

  .btn-sm { padding: 8px 16px; font-size: 11px; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 480px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }
  .modal h3 em { font-style: italic; color: var(--terra); font-weight: 400; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { outline: 1px solid var(--terra); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  .loader {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--terra);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 20, 16, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 200;
    backdrop-filter: blur(8px);
  }

  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 300;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-chip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory-muted);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    letter-spacing: 0.05em;
  }
  .filter-chip.active {
    background: var(--terra);
    border-color: var(--terra);
    color: var(--bg);
  }

  .cantiere, .stat {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeIn 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
  }
  .stat:nth-child(1) { animation-delay: 0.05s; }
  .stat:nth-child(2) { animation-delay: 0.1s; }
  .stat:nth-child(3) { animation-delay: 0.15s; }
  .stat:nth-child(4) { animation-delay: 0.2s; }
  .cantiere:nth-child(1) { animation-delay: 0.25s; }
  .cantiere:nth-child(2) { animation-delay: 0.3s; }
  .cantiere:nth-child(3) { animation-delay: 0.35s; }
  .cantiere:nth-child(4) { animation-delay: 0.4s; }
  .cantiere:nth-child(n+5) { animation-delay: 0.45s; }

  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">Cantieri <em>attivi</em></div>
  <button class="add-btn" onclick="openNewCantiere()" aria-label="Nuovo cantiere">+</button>
</div>

<div class="container">

  <section class="stats">
    <div class="stat corso"><div class="val" id="st-corso">0</div><div class="label">In corso</div></div>
    <div class="stat attesa"><div class="val" id="st-attesa">0</div><div class="label">In attesa</div></div>
    <div class="stat"><div class="val" id="st-completati">0</div><div class="label">Completati</div></div>
    <div class="stat contratto"><div class="val" id="st-totale">€0</div><div class="label">Totale</div></div>
  </section>

  <div class="filters">
    <button class="filter-chip active" data-filter="attivi">Attivi</button>
    <button class="filter-chip" data-filter="tutti">Tutti</button>
    <button class="filter-chip" data-filter="in_corso">In corso</button>
    <button class="filter-chip" data-filter="in_attesa">In attesa</button>
    <button class="filter-chip" data-filter="completato">Completati</button>
    <button class="filter-chip" data-filter="sospeso">Sospesi</button>
  </div>

  <div id="cantieri-container"></div>

</div>

<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <h3>Nuovo <em>cantiere</em></h3>

    <div class="form-group">
      <label>Nome cantiere *</label>
      <input type="text" id="nc-nome" placeholder="es. Villa sul crinale">
    </div>

    <div class="form-group">
      <label>Cliente</label>
      <input type="text" id="nc-cliente" placeholder="es. Famiglia Rossi">
    </div>

    <div class="form-group">
      <label>Indirizzo</label>
      <input type="text" id="nc-indirizzo" placeholder="Via, numero, città">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Data inizio</label>
        <input type="date" id="nc-data-inizio">
      </div>
      <div class="form-group">
        <label>Fine stimata</label>
        <input type="date" id="nc-data-fine">
      </div>
    </div>

    <div class="form-group">
      <label>Note</label>
      <textarea id="nc-note" rows="2" style="resize: vertical;"></textarea>
    </div>

    <div style="background: rgba(201,167,111,0.08); border: 1px dashed rgba(201,167,111,0.3); border-radius: 10px; padding: 12px; font-size: 12px; color: var(--ivory-muted); margin-top: 8px;">
      💡 Dopo aver creato il cantiere potrai caricare il capitolato (Excel o PDF) nella schermata di dettaglio.
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-new')">Annulla</button>
      <button class="btn btn-sm" onclick="saveNewCantiere()">Crea cantiere</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading" style="display:none;">
  <div class="loader"></div>
  <div style="font-size: 13px; color: var(--ivory-muted);" id="loading-text">Caricamento…</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function $(id) { return document.getElementById(id); }
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoader(txt = 'Caricamento…') { $('loading-text').textContent = txt; $('loading').style.display = 'flex'; }
function hideLoader() { $('loading').style.display = 'none'; }
function fmtEuroShort(n) {
  if (!n) return '€0';
  const v = Number(n);
  if (v >= 1000000) return '€' + (v/1000000).toFixed(1) + 'M';
  if (v >= 1000) return '€' + (v/1000).toFixed(0) + 'k';
  return '€' + v.toFixed(0);
}
function fmtEuro(n) {
  if (n === null || n === undefined) return '—';
  return '€' + Number(n).toLocaleString('it-IT', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let state = { cantieri: [], sal: {}, filter: 'attivi' };

async function loadAll() {
  showLoader();
  try {
    const { data: cantieri, error } = await sb.from('cantieri')
      .select('*').order('created_at', { ascending: false });
    if (error) throw error;
    state.cantieri = cantieri || [];

    const { data: sal } = await sb.from('v_cantieri_sal').select('*');
    state.sal = {};
    (sal || []).forEach(s => { state.sal[s.id] = s; });

    render();
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
    console.error(err);
  } finally {
    hideLoader();
  }
}

function render() {
  const inCorso = state.cantieri.filter(c => c.stato === 'in_corso').length;
  const inAttesa = state.cantieri.filter(c => c.stato === 'in_attesa').length;
  const completati = state.cantieri.filter(c => c.stato === 'completato').length;
  const totale = state.cantieri.reduce((s, c) => s + (Number(c.importo_contratto) || 0), 0);

  $('st-corso').textContent = inCorso;
  $('st-attesa').textContent = inAttesa;
  $('st-completati').textContent = completati;
  $('st-totale').textContent = fmtEuroShort(totale);

  let filtered;
  if (state.filter === 'attivi') {
    filtered = state.cantieri.filter(c => c.stato === 'in_corso' || c.stato === 'in_attesa');
  } else if (state.filter === 'tutti') {
    filtered = state.cantieri;
  } else {
    filtered = state.cantieri.filter(c => c.stato === state.filter);
  }

  const container = $('cantieri-container');
  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🏗️</div>
        <h3>Nessun <em>cantiere</em></h3>
        <p>${state.cantieri.length === 0 ? 'Crea il tuo primo cantiere per iniziare' : 'Nessun cantiere con questo filtro'}</p>
        ${state.cantieri.length === 0 ? '<button class="btn" onclick="openNewCantiere()">+ Crea cantiere</button>' : ''}
      </div>
    `;
    return;
  }

  container.innerHTML = '<div class="cantieri-grid">' + filtered.map(c => renderCantiere(c)).join('') + '</div>';
}

function renderCantiere(c) {
  const sal = state.sal[c.id] || { sal_percentuale: 0, ammontare_effettuato: 0, numero_voci: 0 };
  const pct = Number(sal.sal_percentuale) || 0;
  const fatto = Number(sal.ammontare_effettuato) || 0;

  const statoClass = {
    in_corso: 'pill-green',
    in_attesa: 'pill-yellow',
    completato: 'pill-grey',
    sospeso: 'pill-grey'
  }[c.stato] || 'pill-grey';
  const statoLabel = {
    in_corso: 'In corso',
    in_attesa: 'In attesa',
    completato: 'Completato',
    sospeso: 'Sospeso'
  }[c.stato] || c.stato;

  return `
    <a class="cantiere" href="cantiere-dettaglio.html?id=${c.id}">
      <div class="cantiere-head">
        <div class="cantiere-title">${escapeHtml(c.nome || 'Senza nome')}</div>
        <span class="pill ${statoClass}">${statoLabel}</span>
      </div>
      ${c.cliente ? `<div class="cantiere-client">${escapeHtml(c.cliente)}</div>` : ''}
      ${c.indirizzo ? `<div class="cantiere-address">${escapeHtml(c.indirizzo)}</div>` : ''}
      <div class="cantiere-stat">
        <div class="progress-head">
          <div class="progress-pct">${pct.toFixed(0)}<em>%</em></div>
          <div class="progress-amount">
            <b>${fmtEuro(fatto)}</b> di ${fmtEuro(c.importo_contratto)}<br>
            ${sal.numero_voci || 0} voci
          </div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
      </div>
    </a>
  `;
}

document.querySelectorAll('.filter-chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.filter = c.dataset.filter;
    render();
  };
});

function openNewCantiere() {
  $('nc-nome').value = '';
  $('nc-cliente').value = '';
  $('nc-indirizzo').value = '';
  $('nc-data-inizio').value = new Date().toISOString().split('T')[0];
  $('nc-data-fine').value = '';
  $('nc-note').value = '';
  openModal('modal-new');
  setTimeout(() => $('nc-nome').focus(), 100);
}

async function saveNewCantiere() {
  const nome = $('nc-nome').value.trim();
  if (!nome) { toast('Inserisci il nome del cantiere', 'error'); return; }

  showLoader('Creazione cantiere…');
  try {
    const { data, error } = await sb.from('cantieri').insert({
      nome: nome,
      cliente: $('nc-cliente').value.trim() || null,
      indirizzo: $('nc-indirizzo').value.trim() || null,
      data_inizio: $('nc-data-inizio').value || null,
      data_fine_stimata: $('nc-data-fine').value || null,
      note: $('nc-note').value.trim() || null,
      stato: 'in_corso'
    }).select().single();
    if (error) throw error;

    closeModal('modal-new');
    toast('Cantiere creato', 'success');
    setTimeout(() => {
      location.href = 'cantiere-dettaglio.html?id=' + data.id;
    }, 600);
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
  } finally {
    hideLoader();
  }
}

loadAll();
</script>

</body>
</html>
