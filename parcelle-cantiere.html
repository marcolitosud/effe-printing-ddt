<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Parcelle cantiere — Studio Pizzone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410; --bg-soft: #221b15;
    --bg-card: rgba(245,241,232,0.06); --bg-card-hover: rgba(245,241,232,0.1);
    --border: rgba(245,241,232,0.14); --border-hover: rgba(201,167,111,0.55);
    --ivory: #fbf8f0; --ivory-soft: #e8e0cc; --ivory-muted: rgba(251,248,240,0.75); --ivory-faint: rgba(251,248,240,0.5);
    --terra: #c9a76f; --terra-soft: #b8935f; --accent: #d9ba85;
    --green: #7fb069; --yellow: #e6b34a; --red: #d4675b; --blue: #6ba3d4;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ivory); font-family: 'Inter', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(26,20,16,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px; display: flex; align-items: center; gap: 10px;
  }
  .back-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--ivory);
    width: 38px; height: 38px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 16px; flex-shrink: 0;
  }
  .topbar-title { flex: 1; min-width: 0; }
  .topbar-title h1 {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500;
    letter-spacing: -0.005em; line-height: 1.1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topbar-title h1 em { font-style: italic; color: var(--terra); font-weight: 400; }
  .topbar-title .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ivory-muted);
    letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 16px 12px 120px; }
  @media (min-width: 700px) { .container { padding: 24px 24px 120px; } }

  /* STATS CANTIERE */
  .riepilogo {
    background: linear-gradient(135deg, rgba(201,167,111,0.1), rgba(201,167,111,0.02));
    border: 1px solid var(--border-hover);
    border-radius: 16px; padding: 18px;
    margin-bottom: 20px;
  }
  .riepilogo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (min-width: 700px) { .riepilogo-grid { grid-template-columns: repeat(4, 1fr); } }

  .r-item {
    text-align: center;
  }
  .r-item .v {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500;
    line-height: 1; margin-bottom: 4px;
  }
  .r-item .v.g { color: var(--green); }
  .r-item .v.y { color: var(--yellow); }
  .r-item .v.r { color: var(--red); }
  .r-item .v.t { color: var(--terra); }
  .r-item .l {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ivory-muted);
  }

  /* TABS */
  .tabs {
    display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory-muted); padding: 9px 16px; border-radius: 10px;
    font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    font-weight: 500; cursor: pointer; white-space: nowrap;
    font-family: inherit; transition: all 0.25s;
  }
  .tab.active { background: var(--terra); color: var(--bg); border-color: var(--terra); }
  .tab .count {
    background: rgba(0,0,0,0.2); padding: 1px 5px; border-radius: 4px;
    font-size: 10px; margin-left: 5px;
  }
  .tab:not(.active) .count { background: rgba(245,241,232,0.08); }

  .panel { display: none; }
  .panel.active { display: block; }

  .section-head {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px; margin-bottom: 12px;
  }
  .section-head h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500;
    letter-spacing: -0.005em;
  }
  .section-head h2 em { font-style: italic; color: var(--terra); font-weight: 400; }

  /* CONTRATTO CARD */
  .contratto-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px; margin-bottom: 18px;
  }
  .contratto-empty {
    background: rgba(201,167,111,0.06);
    border: 1px dashed rgba(201,167,111,0.3);
    border-radius: 14px; padding: 30px 20px; text-align: center;
    margin-bottom: 18px;
  }

  .row {
    display: flex; justify-content: space-between; gap: 10px;
    padding: 8px 0; font-size: 13px;
    border-bottom: 1px dashed var(--border);
  }
  .row:last-child { border-bottom: none; }
  .row .lbl { color: var(--ivory-muted); font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .row .val { color: var(--ivory); text-align: right; }
  .row .val a { color: var(--terra); text-decoration: none; border-bottom: 1px solid var(--terra); }

  /* RATA CARD */
  .rata {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px; margin-bottom: 8px;
    display: grid; grid-template-columns: 1fr auto auto; gap: 12px;
    align-items: center;
  }
  .rata.fatturata { border-left: 3px solid var(--green); }
  .rata:not(.fatturata) { border-left: 3px solid var(--yellow); }

  .rata-num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--terra); letter-spacing: 0.1em; margin-bottom: 2px;
  }
  .rata-desc { font-size: 13px; color: var(--ivory); }
  .rata-amount {
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    font-weight: 500; color: var(--terra); line-height: 1;
  }

  /* PARCELLA CARD (in pagina cantiere) */
  .parcella-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
    position: relative;
  }
  .parcella-card.st-pagata { border-left: 3px solid var(--green); }
  .parcella-card.st-ritardo { border-left: 3px solid var(--red); }
  .parcella-card.st-attenzione { border-left: 3px solid var(--yellow); }
  .parcella-card.st-emessa { border-left: 3px solid transparent; }

  .p-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px; margin-bottom: 8px;
  }
  .p-num {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--terra); letter-spacing: 0.1em; margin-bottom: 4px;
  }
  .p-desc {
    font-family: 'Cormorant Garamond', serif; font-size: 17px;
    font-weight: 500; line-height: 1.25;
  }
  .p-amount-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    padding-top: 10px; margin-top: 10px; border-top: 1px solid var(--border);
  }
  .p-num-val { display: flex; flex-direction: column; gap: 2px; }
  .p-num-val .vv {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--ivory);
  }
  .p-num-val .ll {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    color: var(--ivory-muted); letter-spacing: 0.1em; text-transform: uppercase;
  }
  .p-num-val.net .vv {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500;
    color: var(--terra); line-height: 1;
  }
  .p-num-val.net .vv.g { color: var(--green); }
  .p-num-val.net .vv.r { color: var(--red); }

  .p-actions {
    margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap;
  }

  /* PILL */
  .pill {
    display: inline-block; font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 5px; white-space: nowrap;
  }
  .p-ok { background: rgba(127,176,105,0.15); color: var(--green); border: 1px solid rgba(127,176,105,0.3); }
  .p-warn { background: rgba(230,179,74,0.15); color: var(--yellow); border: 1px solid rgba(230,179,74,0.3); }
  .p-err { background: rgba(212,103,91,0.15); color: var(--red); border: 1px solid rgba(212,103,91,0.3); }
  .p-none { background: rgba(245,241,232,0.06); color: var(--ivory-muted); border: 1px solid var(--border); }
  .p-blue { background: rgba(107,163,212,0.15); color: var(--blue); border: 1px solid rgba(107,163,212,0.3); }

  /* BTN */
  .btn {
    background: var(--terra); color: var(--bg);
    border: none; padding: 10px 18px; border-radius: 10px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.1em;
    text-transform: uppercase; cursor: pointer; font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }
  .btn-ghost { background: var(--bg-card); color: var(--ivory); border: 1px solid var(--border); }
  .btn-sm { padding: 7px 14px; font-size: 10px; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-success { background: var(--green); color: #fff; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 100; display: none; align-items: center; justify-content: center;
    padding: 16px; backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-soft); border: 1px solid var(--border);
    border-radius: 20px; max-width: 560px; width: 100%;
    max-height: 92vh; overflow-y: auto; padding: 22px;
  }
  .modal h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 500;
    margin-bottom: 14px; letter-spacing: -0.005em;
  }
  .modal h3 em { font-style: italic; color: var(--terra); font-weight: 400; }

  .form-group { margin-bottom: 12px; }
  .form-group label {
    display: block; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--terra); margin-bottom: 5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; background: var(--bg-card); border: 1px solid var(--border);
    color: var(--ivory); padding: 10px 12px; border-radius: 10px;
    font-size: 16px; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: 1px solid var(--terra); }
  .form-group textarea { resize: vertical; min-height: 60px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

  .radio-group { display: flex; gap: 6px; }
  .radio-group label {
    flex: 1; background: var(--bg-card); border: 1px solid var(--border);
    padding: 10px 6px; border-radius: 10px; cursor: pointer;
    text-align: center; text-transform: none; letter-spacing: 0;
    font-size: 12px; color: var(--ivory); font-family: inherit;
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group input[type="radio"]:checked + label {
    background: var(--terra); border-color: var(--terra); color: var(--bg);
  }

  /* CALCOLO AUTOMATICO parcella */
  .calc-box {
    background: rgba(201,167,111,0.06);
    border: 1px dashed rgba(201,167,111,0.3);
    border-radius: 10px; padding: 12px; margin-top: 8px;
  }
  .calc-row {
    display: flex; justify-content: space-between;
    padding: 4px 0; font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  .calc-row.total {
    border-top: 1px solid var(--border);
    margin-top: 6px; padding-top: 10px;
    font-weight: 500; font-size: 15px; color: var(--terra);
  }
  .calc-row .lbl { color: var(--ivory-muted); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
  .calc-row .val { color: var(--ivory); }
  .calc-row.neg .val { color: var(--red); }
  .calc-row.total .val { color: var(--terra); font-family: 'Cormorant Garamond', serif; font-size: 18px; }

  .empty { text-align: center; padding: 50px 20px; color: var(--ivory-muted); }
  .empty-icon { font-size: 42px; margin-bottom: 10px; opacity: 0.5; }
  .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; margin-bottom: 6px; color: var(--ivory); }
  .empty h3 em { font-style: italic; color: var(--terra); }

  .loader {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--terra);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(26,20,16,0.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; z-index: 200; backdrop-filter: blur(8px);
  }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--bg-soft); border: 1px solid var(--border);
    padding: 12px 20px; border-radius: 12px; font-size: 13px; z-index: 300;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="parcelle.html">‹</a>
  <div class="topbar-title">
    <h1 id="topbar-title">Caricamento…</h1>
    <div class="sub" id="topbar-sub">—</div>
  </div>
</div>

<div class="container">

  <!-- RIEPILOGO -->
  <div class="riepilogo">
    <div class="riepilogo-grid">
      <div class="r-item"><div class="v t" id="r-contratto">€0</div><div class="l">Contratto</div></div>
      <div class="r-item"><div class="v" id="r-fatturato">€0</div><div class="l">Fatturato</div></div>
      <div class="r-item"><div class="v g" id="r-incassato">€0</div><div class="l">Incassato</div></div>
      <div class="r-item"><div class="v r" id="r-ritardo">€0</div><div class="l">In ritardo</div></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="contratto">Contratto</button>
    <button class="tab" data-tab="rate">Piano rate <span class="count" id="c-rate">0</span></button>
    <button class="tab" data-tab="parcelle">Parcelle <span class="count" id="c-parcelle">0</span></button>
  </div>

  <!-- PANEL CONTRATTO -->
  <div class="panel active" id="panel-contratto">
    <div id="contratto-wrap"></div>
  </div>

  <!-- PANEL RATE -->
  <div class="panel" id="panel-rate">
    <div class="section-head">
      <h2>Piano <em>pagamenti</em></h2>
      <button class="btn btn-sm" onclick="openNewRata()">+ Rata</button>
    </div>
    <div id="rate-wrap"></div>
  </div>

  <!-- PANEL PARCELLE -->
  <div class="panel" id="panel-parcelle">
    <div class="section-head">
      <h2>Parcelle <em>emesse</em></h2>
      <button class="btn btn-sm" onclick="openNewParcella()">+ Parcella</button>
    </div>
    <div id="parcelle-wrap"></div>
  </div>

</div>

<!-- MODAL CONTRATTO -->
<div class="modal-overlay" id="modal-contratto">
  <div class="modal">
    <h3 id="mc-title">Contratto <em>cantiere</em></h3>

    <div class="form-group">
      <label>Importo totale pattuito</label>
      <input type="number" id="mc-importo" step="0.01" placeholder="0.00">
    </div>

    <div class="form-group">
      <label>Data firma</label>
      <input type="date" id="mc-data">
    </div>

    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;color:var(--ivory);font-family:inherit;font-size:13px;">
        <input type="checkbox" id="mc-dl" style="width:auto;">
        Sono anche Direttore Lavori
      </label>
    </div>

    <div class="form-group">
      <label>File contratto (PDF)</label>
      <input type="file" id="mc-file" accept="application/pdf">
      <div id="mc-file-current" style="font-size: 11px; color: var(--ivory-muted); margin-top: 4px;"></div>
    </div>

    <div class="form-group">
      <label>Note</label>
      <textarea id="mc-note"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-contratto')">Annulla</button>
      <button class="btn btn-sm" onclick="saveContratto()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL RATA -->
<div class="modal-overlay" id="modal-rata">
  <div class="modal">
    <h3 id="mr-title">Nuova <em>rata</em></h3>
    <input type="hidden" id="mr-id">

    <div class="form-group">
      <label>Descrizione *</label>
      <input type="text" id="mr-desc" placeholder="es. Alla firma del contratto">
    </div>

    <div class="form-group">
      <label>Importo €</label>
      <input type="number" id="mr-importo" step="0.01" placeholder="0.00">
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="mr-delete" onclick="deleteRata()" style="display:none;margin-right:auto;">Elimina</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-rata')">Annulla</button>
      <button class="btn btn-sm" onclick="saveRata()">Salva</button>
    </div>
  </div>
</div>

<!-- MODAL PARCELLA -->
<div class="modal-overlay" id="modal-parcella">
  <div class="modal">
    <h3 id="mp-title">Nuova <em>parcella</em></h3>
    <input type="hidden" id="mp-id">

    <div class="form-group">
      <label>Tipo emittente *</label>
      <div class="radio-group">
        <input type="radio" name="mp-tipo" value="opus" id="mp-t-opus" checked>
        <label for="mp-t-opus">🏢 OPUS ARCH<br><small style="font-size:10px;opacity:0.7;">Società · IVA 22%</small></label>
        <input type="radio" name="mp-tipo" value="architetto" id="mp-t-arch">
        <label for="mp-t-arch">👤 Architetto<br><small style="font-size:10px;opacity:0.7;">+ Cassa · − Ritenuta</small></label>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Numero *</label>
        <input type="text" id="mp-numero" placeholder="FPR 15/26">
      </div>
      <div class="form-group">
        <label>Data emissione *</label>
        <input type="date" id="mp-data">
      </div>
    </div>

    <div class="form-group">
      <label>Collega a rata contratto</label>
      <select id="mp-rata">
        <option value="">— Nessuna (fuori piano) —</option>
      </select>
    </div>

    <div class="form-group">
      <label>Descrizione</label>
      <textarea id="mp-desc" placeholder="es. Acconto 30% progetto preliminare"></textarea>
    </div>

    <div class="form-group">
      <label>Imponibile (€) *</label>
      <input type="number" id="mp-imponibile" step="0.01" placeholder="0.00" oninput="calcolaParcella()">
    </div>

    <!-- BOX CALCOLO AUTOMATICO -->
    <div class="calc-box" id="calc-box">
      <div class="calc-row"><span class="lbl">Imponibile</span><span class="val" id="c-imp">€0,00</span></div>
      <div class="calc-row" id="c-cassa-row" style="display:none;"><span class="lbl">+ Cassa Architetti 4%</span><span class="val" id="c-cassa">€0,00</span></div>
      <div class="calc-row"><span class="lbl">+ IVA 22%</span><span class="val" id="c-iva">€0,00</span></div>
      <div class="calc-row total"><span class="lbl">Totale documento</span><span class="val" id="c-tot">€0,00</span></div>
      <div class="calc-row neg" id="c-rit-row" style="display:none;"><span class="lbl">− Ritenuta 20%</span><span class="val" id="c-rit">€0,00</span></div>
      <div class="calc-row total" style="color:var(--green);"><span class="lbl">Netto da incassare</span><span class="val" id="c-netto" style="color:var(--green);">€0,00</span></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Scadenza pagamento</label>
        <input type="date" id="mp-scadenza">
      </div>
      <div class="form-group">
        <label>Data pagamento</label>
        <input type="date" id="mp-pagamento">
      </div>
    </div>

    <div class="form-group">
      <label>File parcella (PDF)</label>
      <input type="file" id="mp-file" accept="application/pdf">
      <div id="mp-file-current" style="font-size: 11px; color: var(--ivory-muted); margin-top: 4px;"></div>
    </div>

    <div class="form-group">
      <label>Note</label>
      <textarea id="mp-note"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" id="mp-delete" onclick="deleteParcella()" style="display:none;margin-right:auto;">Elimina</button>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-parcella')">Annulla</button>
      <button class="btn btn-sm" onclick="saveParcella()">Salva</button>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loading" style="display:none;">
  <div class="loader"></div>
  <div style="font-size: 12px; color: var(--ivory-muted); font-family: 'JetBrains Mono', monospace;" id="loading-text">Caricamento…</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const cantiereId = new URLSearchParams(location.search).get('cantiere');
const focusParcella = new URLSearchParams(location.search).get('parcella');
if (!cantiereId) location.href = 'parcelle.html';

function $(id) { return document.getElementById(id); }
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function toast(msg, type = '') { const t=$('toast'); t.textContent=msg; t.className='toast '+type+' show'; setTimeout(()=>t.classList.remove('show'),3000); }
function showLoader(t='Caricamento…'){ $('loading-text').textContent=t; $('loading').style.display='flex'; }
function hideLoader(){ $('loading').style.display='none'; }
function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtEuro(n){ if(n===null||n===undefined) return '€0'; return '€'+Number(n).toLocaleString('it-IT',{minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtEuroShort(n){ if(!n) return '€0'; const v=Number(n); if(v>=1000000) return '€'+(v/1000000).toFixed(1)+'M'; if(v>=1000) return '€'+(v/1000).toFixed(0)+'k'; return '€'+v.toFixed(0); }
function fmtDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('it-IT'); }
function getStorageUrl(bucket, path){ return `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`; }
function daysDiff(d){ const a=new Date(d); const b=new Date(); return Math.floor((b-a)/(1000*60*60*24)); }
function getStatus(p){
  if (p.data_pagamento) return 'pagata';
  if (!p.data_scadenza) return 'emessa';
  const diff = daysDiff(p.data_scadenza);
  if (diff <= 0) return 'emessa';
  if (diff > 30) return 'ritardo';
  if (diff > 15) return 'attenzione';
  return 'emessa';
}

// ==========================================
// CALCOLO PARCELLA
// ==========================================
function calcolaParcella() {
  const imp = parseFloat($('mp-imponibile').value) || 0;
  const tipo = document.querySelector('input[name="mp-tipo"]:checked')?.value || 'opus';

  let cassa = 0, iva = 0, ritenuta = 0, tot = 0, netto = 0;

  if (tipo === 'architetto') {
    cassa = imp * 0.04;
    iva = (imp + cassa) * 0.22;
    ritenuta = imp * 0.20;
    tot = imp + cassa + iva;
    netto = tot - ritenuta;
    $('c-cassa-row').style.display = 'flex';
    $('c-rit-row').style.display = 'flex';
  } else {
    iva = imp * 0.22;
    tot = imp + iva;
    netto = tot;
    $('c-cassa-row').style.display = 'none';
    $('c-rit-row').style.display = 'none';
  }

  $('c-imp').textContent = fmtEuro(imp);
  $('c-cassa').textContent = fmtEuro(cassa);
  $('c-iva').textContent = fmtEuro(iva);
  $('c-rit').textContent = '− ' + fmtEuro(ritenuta);
  $('c-tot').textContent = fmtEuro(tot);
  $('c-netto').textContent = fmtEuro(netto);

  return { cassa, iva, ritenuta, tot, netto };
}

document.querySelectorAll('input[name="mp-tipo"]').forEach(r => r.onchange = calcolaParcella);

// ==========================================
// STATE
// ==========================================
let state = {
  cantiere: null,
  contratto: null,
  rate: [],
  parcelle: [],
  editingParcella: null,
  editingRata: null
};

async function loadAll() {
  showLoader();
  try {
    const [{data: c}, {data: co}, {data: par}] = await Promise.all([
      sb.from('cantieri').select('*').eq('id', cantiereId).single(),
      sb.from('contratti_cantiere').select('*').eq('cantiere_id', cantiereId).maybeSingle(),
      sb.from('parcelle').select('*').eq('cantiere_id', cantiereId).order('data_emissione', { ascending: false })
    ]);
    state.cantiere = c;
    state.contratto = co;
    state.parcelle = par || [];

    $('topbar-title').innerHTML = escapeHtml(c?.nome || 'Cantiere');
    $('topbar-sub').textContent = c?.cliente || c?.indirizzo || '';

    if (state.contratto) {
      const { data: rate } = await sb.from('piano_rate')
        .select('*').eq('contratto_id', state.contratto.id).order('numero');
      state.rate = rate || [];
    } else {
      state.rate = [];
    }

    render();

    // se arrivo con ?parcella=xxx apro in modifica
    if (focusParcella) {
      const p = state.parcelle.find(x => x.id === focusParcella);
      if (p) editParcella(p);
    }
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
    console.error(err);
  } finally {
    hideLoader();
  }
}

function render() {
  renderContratto();
  renderRate();
  renderParcelle();
  renderRiepilogo();
  $('c-rate').textContent = state.rate.length;
  $('c-parcelle').textContent = state.parcelle.length;
}

function renderRiepilogo() {
  const importoContr = Number(state.contratto?.importo_totale) || 0;
  let fatt = 0, inc = 0, rit = 0;
  state.parcelle.forEach(p => {
    fatt += Number(p.imponibile) || 0;
    if (p.data_pagamento) inc += Number(p.netto_incassare) || 0;
    else {
      const st = getStatus(p);
      if (st === 'ritardo') rit += Number(p.netto_incassare) || 0;
    }
  });
  $('r-contratto').textContent = fmtEuroShort(importoContr);
  $('r-fatturato').textContent = fmtEuroShort(fatt);
  $('r-incassato').textContent = fmtEuroShort(inc);
  $('r-ritardo').textContent = fmtEuroShort(rit);
}

function renderContratto() {
  const c = $('contratto-wrap');
  if (!state.contratto) {
    c.innerHTML = `
      <div class="contratto-empty">
        <div style="font-size:40px;margin-bottom:10px;opacity:0.5;">📄</div>
        <h3 style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;margin-bottom:8px;">Nessun <em style="font-style:italic;color:var(--terra);">contratto</em></h3>
        <p style="font-size:13px;color:var(--ivory-muted);margin-bottom:16px;">Inserisci il contratto con il cliente per iniziare la contabilità</p>
        <button class="btn" onclick="openContratto()">+ Aggiungi contratto</button>
      </div>
    `;
    return;
  }
  const co = state.contratto;
  c.innerHTML = `
    <div class="contratto-card">
      <div class="row">
        <span class="lbl">Importo totale</span>
        <span class="val" style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--terra);">${fmtEuro(co.importo_totale)}</span>
      </div>
      <div class="row"><span class="lbl">Data firma</span><span class="val">${fmtDate(co.data_firma)}</span></div>
      <div class="row">
        <span class="lbl">Direttore lavori</span>
        <span class="val">${co.direttore_lavori ? '<span class="pill p-ok">Sì</span>' : '<span class="pill p-none">No</span>'}</span>
      </div>
      ${co.contratto_file_path ? `<div class="row"><span class="lbl">Contratto</span><span class="val"><a href="${getStorageUrl('parcelle-contratti', co.contratto_file_path)}" target="_blank">📎 Apri PDF</a></span></div>` : ''}
      ${co.note ? `<div class="row"><span class="lbl">Note</span><span class="val" style="text-align:left;max-width:60%;font-size:12px;">${escapeHtml(co.note)}</span></div>` : ''}
      <div style="margin-top:14px;display:flex;gap:6px;">
        <button class="btn btn-ghost btn-sm" onclick="openContratto()">Modifica</button>
      </div>
    </div>
  `;
}

function renderRate() {
  const c = $('rate-wrap');
  if (!state.contratto) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📄</div><h3>Prima il <em>contratto</em></h3><p>Inserisci il contratto per definire il piano rate</p></div>`;
    return;
  }
  if (state.rate.length === 0) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Nessuna <em>rata</em></h3><p>Aggiungi le rate concordate nel contratto</p></div>`;
    return;
  }
  const totalRate = state.rate.reduce((s,r)=>s + (Number(r.importo)||0), 0);
  c.innerHTML = state.rate.map((r,i) => `
    <div class="rata ${r.fatturata?'fatturata':''}" onclick="editRata('${r.id}')" style="cursor:pointer;">
      <div>
        <div class="rata-num">Rata #${i+1}</div>
        <div class="rata-desc">${escapeHtml(r.descrizione)}</div>
      </div>
      <div class="rata-amount">${fmtEuro(r.importo)}</div>
      <div>${r.fatturata ? '<span class="pill p-ok">Fatturata</span>' : '<span class="pill p-warn">Da fatt.</span>'}</div>
    </div>
  `).join('') + `
    <div style="margin-top:14px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12px;">
      <span style="color:var(--ivory-muted);">Totale piano rate</span>
      <span style="color:var(--terra);font-weight:500;">${fmtEuro(totalRate)}</span>
    </div>
    ${state.contratto && Math.abs(totalRate - Number(state.contratto.importo_totale)) > 0.01 ? `
      <div style="margin-top:8px;padding:10px 14px;background:rgba(230,179,74,0.1);border:1px solid rgba(230,179,74,0.3);border-radius:10px;font-size:11px;color:var(--yellow);">
        ⚠ Il totale delle rate (${fmtEuro(totalRate)}) non corrisponde all'importo del contratto (${fmtEuro(state.contratto.importo_totale)})
      </div>` : ''}
  `;
}

function renderParcelle() {
  const c = $('parcelle-wrap');
  if (state.parcelle.length === 0) {
    c.innerHTML = `<div class="empty"><div class="empty-icon">📄</div><h3>Nessuna <em>parcella</em></h3><p>Emetti la prima parcella per questo cantiere</p></div>`;
    return;
  }
  c.innerHTML = state.parcelle.map(p => {
    const st = getStatus(p);
    const emittente = p.tipo_emittente === 'opus' ? 'OPUS ARCH' : 'Architetto';
    let statusPill = '';
    if (st === 'pagata') statusPill = `<span class="pill p-ok">Pagata ${fmtDate(p.data_pagamento)}</span>`;
    else if (st === 'ritardo') statusPill = `<span class="pill p-err">Ritardo ${daysDiff(p.data_scadenza)}gg</span>`;
    else if (st === 'attenzione') statusPill = `<span class="pill p-warn">Scaduta ${daysDiff(p.data_scadenza)}gg</span>`;
    else if (p.data_scadenza) statusPill = `<span class="pill p-none">Scade ${fmtDate(p.data_scadenza)}</span>`;
    else statusPill = `<span class="pill p-none">Emessa</span>`;
    const netCls = st==='pagata'?'g':(st==='ritardo'?'r':'');

    return `
      <div class="parcella-card st-${st}">
        <div class="p-head">
          <div style="flex:1;min-width:0;">
            <div class="p-num">${escapeHtml(p.numero)} · ${emittente} · ${fmtDate(p.data_emissione)}</div>
            <div class="p-desc">${escapeHtml(p.descrizione || '(senza descrizione)')}</div>
          </div>
          ${statusPill}
        </div>
        <div class="p-amount-row">
          <div class="p-num-val"><span class="vv">${fmtEuro(p.imponibile)}</span><span class="ll">Imponibile</span></div>
          <div class="p-num-val"><span class="vv">${fmtEuro(p.iva)}</span><span class="ll">IVA</span></div>
          <div class="p-num-val"><span class="vv">${fmtEuro(p.totale_documento)}</span><span class="ll">Totale</span></div>
          <div class="p-num-val net"><span class="vv ${netCls}">${fmtEuro(p.netto_incassare)}</span><span class="ll">Netto</span></div>
        </div>
        <div class="p-actions">
          ${p.parcella_file_path ? `<a class="btn btn-ghost btn-sm" href="${getStorageUrl('parcelle-files', p.parcella_file_path)}" target="_blank">📎 Apri PDF</a>` : ''}
          ${!p.data_pagamento ? `<button class="btn btn-success btn-sm" onclick="markPaid('${p.id}')">Segna come pagata</button>` : ''}
          <button class="btn btn-ghost btn-sm" onclick="editParcellaById('${p.id}')">Modifica</button>
        </div>
      </div>
    `;
  }).join('');
}

// ==========================================
// CONTRATTO
// ==========================================
function openContratto() {
  const c = state.contratto;
  $('mc-importo').value = c?.importo_totale || '';
  $('mc-data').value = c?.data_firma || '';
  $('mc-dl').checked = !!c?.direttore_lavori;
  $('mc-note').value = c?.note || '';
  $('mc-file').value = '';
  $('mc-file-current').innerHTML = c?.contratto_file_path ?
    `<a href="${getStorageUrl('parcelle-contratti', c.contratto_file_path)}" target="_blank" style="color:var(--terra);">📎 Contratto attuale</a>` : '';
  openModal('modal-contratto');
}

async function saveContratto() {
  const importo = parseFloat($('mc-importo').value) || null;
  const data_firma = $('mc-data').value || null;
  const dl = $('mc-dl').checked;
  const note = $('mc-note').value.trim() || null;
  const file = $('mc-file').files[0];

  showLoader('Salvataggio…');
  try {
    let filePath = state.contratto?.contratto_file_path || null;
    if (file) {
      const path = `${cantiereId}/${Date.now()}_${file.name}`;
      const { error } = await sb.storage.from('parcelle-contratti').upload(path, file);
      if (!error) filePath = path;
    }

    const payload = {
      cantiere_id: cantiereId,
      importo_totale: importo,
      data_firma,
      direttore_lavori: dl,
      contratto_file_path: filePath,
      note
    };

    if (state.contratto) {
      await sb.from('contratti_cantiere').update(payload).eq('id', state.contratto.id);
    } else {
      await sb.from('contratti_cantiere').insert(payload);
    }
    closeModal('modal-contratto');
    toast('Contratto salvato', 'success');
    await loadAll();
  } catch (err) { toast('Errore: ' + err.message, 'error'); console.error(err); }
  finally { hideLoader(); }
}

// ==========================================
// RATE
// ==========================================
function openNewRata() {
  if (!state.contratto) { toast('Inserisci prima il contratto', 'error'); return; }
  state.editingRata = null;
  $('mr-id').value = '';
  $('mr-title').innerHTML = 'Nuova <em>rata</em>';
  $('mr-desc').value = '';
  $('mr-importo').value = '';
  $('mr-delete').style.display = 'none';
  openModal('modal-rata');
  setTimeout(() => $('mr-desc').focus(), 100);
}

function editRata(id) {
  const r = state.rate.find(x => x.id === id);
  if (!r) return;
  state.editingRata = r;
  $('mr-id').value = r.id;
  $('mr-title').innerHTML = 'Modifica <em>rata</em>';
  $('mr-desc').value = r.descrizione;
  $('mr-importo').value = r.importo;
  $('mr-delete').style.display = 'inline-block';
  openModal('modal-rata');
}

async function saveRata() {
  const desc = $('mr-desc').value.trim();
  const imp = parseFloat($('mr-importo').value);
  if (!desc || isNaN(imp)) { toast('Compila descrizione e importo', 'error'); return; }

  showLoader('Salvataggio…');
  try {
    if (state.editingRata) {
      await sb.from('piano_rate').update({ descrizione: desc, importo: imp }).eq('id', state.editingRata.id);
    } else {
      await sb.from('piano_rate').insert({
        contratto_id: state.contratto.id,
        numero: state.rate.length + 1,
        descrizione: desc,
        importo: imp
      });
    }
    closeModal('modal-rata');
    toast('Rata salvata', 'success');
    await loadAll();
  } catch (err) { toast('Errore: ' + err.message, 'error'); }
  finally { hideLoader(); }
}

async function deleteRata() {
  if (!state.editingRata) return;
  if (!confirm('Eliminare questa rata?')) return;
  await sb.from('piano_rate').delete().eq('id', state.editingRata.id);
  closeModal('modal-rata');
  toast('Rata eliminata');
  await loadAll();
}

// ==========================================
// PARCELLE
// ==========================================
function openNewParcella() {
  state.editingParcella = null;
  $('mp-id').value = '';
  $('mp-title').innerHTML = 'Nuova <em>parcella</em>';
  $('mp-t-opus').checked = true;
  $('mp-numero').value = '';
  $('mp-data').value = new Date().toISOString().split('T')[0];
  $('mp-desc').value = '';
  $('mp-imponibile').value = '';
  $('mp-scadenza').value = '';
  $('mp-pagamento').value = '';
  $('mp-note').value = '';
  $('mp-file').value = '';
  $('mp-delete').style.display = 'none';
  $('mp-file-current').innerHTML = '';
  populateRateSelect();
  calcolaParcella();
  openModal('modal-parcella');
  setTimeout(() => $('mp-numero').focus(), 100);
}

function populateRateSelect() {
  const sel = $('mp-rata');
  const opts = ['<option value="">— Nessuna (fuori piano) —</option>'];
  state.rate.forEach((r,i) => {
    const fattBy = state.parcelle.find(p => p.rata_id === r.id);
    const isFatt = !!fattBy;
    if (!isFatt || (state.editingParcella && fattBy?.id === state.editingParcella.id)) {
      opts.push(`<option value="${r.id}">#${i+1} · ${escapeHtml(r.descrizione)} · ${fmtEuro(r.importo)}</option>`);
    }
  });
  sel.innerHTML = opts.join('');
  // auto-fill importo quando si seleziona una rata
  sel.onchange = () => {
    const r = state.rate.find(x => x.id === sel.value);
    if (r && !$('mp-imponibile').value) {
      $('mp-imponibile').value = r.importo;
      if (!$('mp-desc').value) $('mp-desc').value = r.descrizione;
      calcolaParcella();
    }
  };
}

function editParcellaById(id) {
  const p = state.parcelle.find(x => x.id === id);
  if (p) editParcella(p);
}

function editParcella(p) {
  state.editingParcella = p;
  $('mp-id').value = p.id;
  $('mp-title').innerHTML = 'Modifica <em>parcella</em>';
  document.querySelector(`input[name="mp-tipo"][value="${p.tipo_emittente}"]`).checked = true;
  $('mp-numero').value = p.numero || '';
  $('mp-data').value = p.data_emissione || '';
  populateRateSelect();
  $('mp-rata').value = p.rata_id || '';
  $('mp-desc').value = p.descrizione || '';
  $('mp-imponibile').value = p.imponibile || '';
  $('mp-scadenza').value = p.data_scadenza || '';
  $('mp-pagamento').value = p.data_pagamento || '';
  $('mp-note').value = p.note || '';
  $('mp-file').value = '';
  $('mp-delete').style.display = 'inline-block';
  $('mp-file-current').innerHTML = p.parcella_file_path ?
    `<a href="${getStorageUrl('parcelle-files', p.parcella_file_path)}" target="_blank" style="color:var(--terra);">📎 File attuale</a>` : '';
  calcolaParcella();
  openModal('modal-parcella');
}

async function saveParcella() {
  const numero = $('mp-numero').value.trim();
  const data = $('mp-data').value;
  const imp = parseFloat($('mp-imponibile').value);
  if (!numero || !data || isNaN(imp) || imp <= 0) { toast('Compila numero, data e imponibile', 'error'); return; }

  const tipo = document.querySelector('input[name="mp-tipo"]:checked').value;
  const { cassa, iva, ritenuta, tot, netto } = calcolaParcella();

  showLoader('Salvataggio…');
  try {
    let filePath = state.editingParcella?.parcella_file_path || null;
    const file = $('mp-file').files[0];
    if (file) {
      const path = `${cantiereId}/${Date.now()}_${file.name}`;
      const { error } = await sb.storage.from('parcelle-files').upload(path, file);
      if (!error) filePath = path;
    }

    const rataId = $('mp-rata').value || null;
    const payload = {
      cantiere_id: cantiereId,
      rata_id: rataId,
      numero,
      tipo_emittente: tipo,
      data_emissione: data,
      descrizione: $('mp-desc').value.trim() || null,
      imponibile: imp,
      cassa: cassa || 0,
      iva: iva || 0,
      ritenuta: ritenuta || 0,
      totale_documento: tot,
      netto_incassare: netto,
      data_scadenza: $('mp-scadenza').value || null,
      data_pagamento: $('mp-pagamento').value || null,
      parcella_file_path: filePath,
      note: $('mp-note').value.trim() || null
    };

    if (state.editingParcella) {
      await sb.from('parcelle').update(payload).eq('id', state.editingParcella.id);
      // se prima era legata a una rata diversa, libero la vecchia
      if (state.editingParcella.rata_id && state.editingParcella.rata_id !== rataId) {
        await sb.from('piano_rate').update({ fatturata: false, parcella_id: null }).eq('id', state.editingParcella.rata_id);
      }
    } else {
      const { data: ins } = await sb.from('parcelle').insert(payload).select().single();
      payload.id = ins.id;
    }

    // se c'è una rata collegata, marcala come fatturata
    if (rataId) {
      await sb.from('piano_rate').update({ fatturata: true }).eq('id', rataId);
    }

    closeModal('modal-parcella');
    toast('Parcella salvata', 'success');
    await loadAll();
  } catch (err) { toast('Errore: ' + err.message, 'error'); console.error(err); }
  finally { hideLoader(); }
}

async function deleteParcella() {
  if (!state.editingParcella) return;
  if (!confirm('Eliminare questa parcella?')) return;
  // libera la rata se c'è
  if (state.editingParcella.rata_id) {
    await sb.from('piano_rate').update({ fatturata: false }).eq('id', state.editingParcella.rata_id);
  }
  await sb.from('parcelle').delete().eq('id', state.editingParcella.id);
  closeModal('modal-parcella');
  toast('Parcella eliminata');
  await loadAll();
}

async function markPaid(id) {
  if (!confirm('Segnare la parcella come pagata con data di oggi?')) return;
  await sb.from('parcelle').update({ data_pagamento: new Date().toISOString().split('T')[0] }).eq('id', id);
  toast('Segnata come pagata', 'success');
  await loadAll();
}

// TABS
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    t.classList.add('active');
    $('panel-' + t.dataset.tab).classList.add('active');
  };
});

loadAll();
</script>
</body>
</html>
