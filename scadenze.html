<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1410">
<title>Scadenze — Studio Pizzone</title>
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="Pizzone">
<meta name="application-name" content="Studio Pizzone">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410;
    --bg-soft: #221b15;
    --bg-card: rgba(245, 241, 232, 0.06);
    --bg-card-hover: rgba(245, 241, 232, 0.1);
    --border: rgba(245, 241, 232, 0.14);
    --border-hover: rgba(201, 167, 111, 0.55);
    --ivory: #fbf8f0;
    --ivory-soft: #e8e0cc;
    --ivory-muted: rgba(251, 248, 240, 0.75);
    --ivory-faint: rgba(251, 248, 240, 0.5);
    --terra: #c9a76f;
    --terra-soft: #b8935f;
    --terra-dark: #8b6f47;
    --accent: #d9ba85;
    --green: #7fb069;
    --yellow: #e6b34a;
    --red: #d4675b;
    --blue: #6ba3d4;
    --purple: #a78bc9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Inter', -apple-system, sans-serif;
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    min-height: 100dvh;
  }

  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(26, 20, 16, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .back-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    width: 40px; height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 18px;
  }
  .back-btn:active { transform: scale(0.94); }

  .topbar-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    flex: 1;
    letter-spacing: -0.005em;
  }
  .topbar-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .add-btn {
    background: var(--terra);
    color: var(--bg);
    border: none;
    width: 40px; height: 40px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 400;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .add-btn:active { transform: scale(0.94); }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px 120px;
  }
  @media (min-width: 700px) {
    .container { padding: 24px; }
  }

  /* VIEW SWITCHER */
  .view-switcher {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px;
  }

  .view-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--ivory-muted);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .view-btn.active {
    background: var(--terra);
    color: var(--bg);
  }

  /* NAV (prev/next + mese/settimana) */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 10px;
  }

  .nav-arrows {
    display: flex;
    gap: 6px;
  }

  .nav-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    width: 36px; height: 36px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--bg-card-hover); }

  .today-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 0 14px;
    height: 36px;
    border-radius: 10px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .today-btn:hover { background: var(--bg-card-hover); }

  .current-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 500;
    letter-spacing: -0.005em;
    flex: 1;
    text-align: center;
  }
  .current-label em { font-style: italic; color: var(--terra); font-weight: 400; }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    font-size: 11px;
    color: var(--ivory-muted);
  }

  .legend-item {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 8px;
    background: var(--bg-card);
    border-radius: 6px;
  }

  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-appt { background: var(--terra); }
  .dot-sop { background: var(--blue); }
  .dot-vis { background: var(--purple); }
  .dot-inizio { background: var(--green); }
  .dot-fine { background: var(--red); }
  .dot-merce { background: var(--yellow); }
  .dot-lav { background: var(--blue); }
  .dot-variante { background: var(--purple); }

  /* ====================================
     VISTA MESE
     ==================================== */
  .month-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .month-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
  }

  .month-header > div {
    padding: 10px 4px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ivory-muted);
  }

  .month-cells {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-auto-rows: minmax(80px, auto);
  }

  @media (min-width: 700px) {
    .month-cells { grid-auto-rows: minmax(110px, auto); }
  }

  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 6px;
    position: relative;
    overflow: hidden;
    min-height: 80px;
  }

  .day-cell:nth-child(7n) { border-right: none; }

  .day-cell.other-month {
    background: rgba(0,0,0,0.2);
    opacity: 0.4;
  }

  .day-cell.today {
    background: rgba(201, 167, 111, 0.08);
  }

  .day-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--ivory);
  }

  .day-cell.today .day-num {
    color: var(--terra);
    font-weight: 600;
  }

  .day-cell.today .day-num::after {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--terra);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
  }

  .day-events {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .event-chip {
    font-size: 10px;
    padding: 2px 4px;
    border-radius: 3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.3;
    cursor: pointer;
    color: #fff;
    font-weight: 500;
  }

  .event-chip.type-appuntamento { background: var(--terra-dark); }
  .event-chip.type-sopralluogo { background: var(--blue); }
  .event-chip.type-visita_cantiere { background: var(--purple); }
  .event-chip.type-cantiere_inizio { background: var(--green); }
  .event-chip.type-cantiere_fine { background: var(--red); }
  .event-chip.type-arrivo_merce { background: var(--yellow); color: #1a1410; }
  .event-chip.type-inizio_lavorazione { background: var(--blue); }
  .event-chip.type-fine_lavorazione { background: #4a7da6; }
  .event-chip.type-variante { background: var(--purple); }

  .more-events {
    font-size: 9px;
    color: var(--ivory-muted);
    font-family: 'JetBrains Mono', monospace;
    padding: 0 4px;
    margin-top: 2px;
  }

  /* ====================================
     VISTA SETTIMANA
     ==================================== */
  .week-grid {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .week-header {
    display: grid;
    grid-template-columns: 50px repeat(7, 1fr);
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--border);
  }

  .week-header > div {
    padding: 8px 4px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-muted);
    border-right: 1px solid var(--border);
  }
  .week-header > div:last-child { border-right: none; }

  .week-day-header {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .week-day-header .dn { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; }
  .week-day-header .dd {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--ivory);
  }
  .week-day-header.today .dd { color: var(--terra); }

  .week-body {
    display: grid;
    grid-template-columns: 50px repeat(7, 1fr);
    max-height: 65vh;
    overflow-y: auto;
  }

  .hour-label {
    padding: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--ivory-muted);
    text-align: right;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 50px;
  }

  .hour-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 50px;
    position: relative;
    padding: 2px;
  }
  .hour-cell:nth-child(8n) { border-right: none; }

  .hour-event {
    font-size: 10px;
    padding: 3px 5px;
    border-radius: 4px;
    color: #fff;
    margin-bottom: 2px;
    cursor: pointer;
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ====================================
     VISTA AGENDA
     ==================================== */
  .agenda-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .agenda-day {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .agenda-day-header {
    background: rgba(0,0,0,0.2);
    padding: 10px 16px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }

  .agenda-day-header.today {
    background: rgba(201, 167, 111, 0.12);
  }

  .agenda-day-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ivory);
    line-height: 1;
  }
  .agenda-day-header.today .agenda-day-number { color: var(--terra); }

  .agenda-day-info {
    flex: 1;
    display: flex;
    flex-direction: column;
  }
  .agenda-day-weekday {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--terra);
  }
  .agenda-day-month {
    font-size: 12px;
    color: var(--ivory-muted);
  }

  .agenda-events {
    display: flex;
    flex-direction: column;
  }

  .agenda-event {
    padding: 12px 16px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }
  .agenda-event:last-child { border-bottom: none; }
  .agenda-event:hover { background: rgba(245,241,232,0.03); }

  .agenda-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ivory-muted);
    flex-shrink: 0;
    min-width: 46px;
    padding-top: 2px;
    letter-spacing: 0.05em;
  }

  .agenda-content {
    flex: 1;
    min-width: 0;
  }

  .agenda-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 500;
    line-height: 1.2;
    letter-spacing: -0.005em;
    margin-bottom: 2px;
  }
  .agenda-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .agenda-sub {
    font-size: 12px;
    color: var(--ivory-muted);
  }

  .agenda-meta {
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-faint);
    letter-spacing: 0.05em;
  }

  .agenda-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--ivory-muted);
  }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    margin-bottom: 8px;
    color: var(--ivory);
  }
  .empty h3 em { font-style: italic; color: var(--terra); }
  .empty p { font-size: 14px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 520px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 24px;
  }

  .modal h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: -0.005em;
  }
  .modal h3 em { font-style: italic; color: var(--terra); font-weight: 400; }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--terra);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--ivory);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 16px;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { outline: 1px solid var(--terra); }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  .radio-group {
    display: flex;
    gap: 6px;
  }
  .radio-group label {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 10px 6px;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
    text-transform: none;
    letter-spacing: 0;
    font-size: 12px;
    color: var(--ivory);
    font-family: inherit;
    transition: all 0.2s;
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group input[type="radio"]:checked + label {
    background: var(--terra);
    border-color: var(--terra);
    color: var(--bg);
  }

  /* BTN */
  .btn {
    background: var(--terra);
    color: var(--bg);
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-ghost {
    background: var(--bg-card);
    color: var(--ivory);
    border: 1px solid var(--border);
  }
  .btn-danger { background: var(--red); color: #fff; border: none; }
  .btn-sm { padding: 8px 14px; font-size: 11px; }

  /* LOADING */
  .loader {
    display: inline-block;
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--terra);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 20, 16, 0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 200;
    backdrop-filter: blur(8px);
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-soft);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    z-index: 300;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    max-width: 90vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }

  /* EVENT DETAIL PANEL (modal informativo) */
  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .detail-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    margin-top: 8px;
    flex-shrink: 0;
  }
  .detail-title {
    flex: 1;
  }
  .detail-title h3 {
    margin-bottom: 4px;
  }
  .detail-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--terra);
  }
  .detail-row {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    font-size: 14px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-row .lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ivory-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-top: 2px;
  }
  .detail-row .val {
    color: var(--ivory);
  }
  .detail-row .val a {
    color: var(--terra);
    text-decoration: none;
    border-bottom: 1px solid var(--terra);
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">Scadenze <em>& appuntamenti</em></div>
  <button class="add-btn" onclick="openNewEvent()" aria-label="Nuovo evento">+</button>
</div>

<div class="container">

  <!-- VIEW SWITCHER -->
  <div class="view-switcher">
    <button class="view-btn active" data-view="mese">Mese</button>
    <button class="view-btn" data-view="settimana">Settimana</button>
    <button class="view-btn" data-view="agenda">Agenda</button>
  </div>

  <!-- NAV ROW -->
  <div class="nav-row">
    <div class="nav-arrows">

<script>
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function $(id) { return document.getElementById(id); }
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }
function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
function showLoader(txt = 'Caricamento…') { $('loading-text').textContent = txt; $('loading').style.display = 'flex'; }
function hideLoader() { $('loading').style.display = 'none'; }
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('it-IT', { day: 'numeric', month: 'long', year: 'numeric' });
}
function fmtTime(d) {
  if (!d) return '';
  return new Date(d).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
}
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function startOfWeek(d) {
  const nd = new Date(d);
  const day = nd.getDay();
  const diff = (day === 0 ? -6 : 1 - day); // Monday as start
  nd.setDate(nd.getDate() + diff);
  nd.setHours(0,0,0,0);
  return nd;
}

// ============================================
// STATO
// ============================================
let state = {
  currentDate: new Date(),
  view: 'mese',
  eventi: [],       // eventi manuali
  cantieri: [],     // tutti i cantieri
  fornitori: [],    // tutti i fornitori extra
  varianti: [],     // tutte le varianti
  currentDetail: null
};

// ============================================
// CARICAMENTO DATI
// ============================================
async function loadAll() {
  showLoader();
  try {
    const [{data: ev}, {data: cant}, {data: forn}, {data: var_}] = await Promise.all([
      sb.from('eventi').select('*').order('data_ora'),
      sb.from('cantieri').select('id, nome, cliente, data_inizio, data_fine_stimata'),
      sb.from('fornitori_extra').select('id, cantiere_id, nome_fornitore, tipo, descrizione, data_arrivo_merce, data_inizio_stimata, data_fine_stimata'),
      sb.from('varianti').select('id, cantiere_id, data, descrizione, importo')
    ]);
    state.eventi = ev || [];
    state.cantieri = cant || [];
    state.fornitori = forn || [];
    state.varianti = var_ || [];

    // popolo select cantieri modal
    const sel = $('ev-cantiere');
    sel.innerHTML = '<option value="">— Nessuno —</option>' +
      state.cantieri.map(c => `<option value="${c.id}">${escapeHtml(c.nome)}${c.cliente ? ' · '+escapeHtml(c.cliente) : ''}</option>`).join('');

    render();
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
    console.error(err);
  } finally {
    hideLoader();
  }
}

// ============================================
// GENERATORE EVENTI UNIFICATI
// Restituisce tutti gli eventi (manuali + auto) in formato uniforme
// ============================================
function getAllEvents() {
  const events = [];
  const cantMap = {};
  state.cantieri.forEach(c => { cantMap[c.id] = c; });

  // eventi manuali
  state.eventi.forEach(e => {
    const c = cantMap[e.cantiere_id];
    events.push({
      id: 'm_' + e.id,
      rawId: e.id,
      tipo: e.tipo, // appuntamento | sopralluogo | visita_cantiere
      date: new Date(e.data_ora),
      titolo: e.titolo,
      sottotitolo: c ? c.nome : (e.luogo || ''),
      source: 'manual',
      data: e,
      cantiere: c
    });
  });

  // cantieri: data_inizio + data_fine_stimata
  state.cantieri.forEach(c => {
    if (c.data_inizio) {
      events.push({
        id: 'ci_' + c.id,
        tipo: 'cantiere_inizio',
        date: new Date(c.data_inizio + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Inizio cantiere',
        source: 'auto',
        cantiere: c
      });
    }
    if (c.data_fine_stimata) {
      events.push({
        id: 'cf_' + c.id,
        tipo: 'cantiere_fine',
        date: new Date(c.data_fine_stimata + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Fine prevista',
        source: 'auto',
        cantiere: c
      });
    }
  });

  // fornitori: arrivo merce, inizio lavorazione, fine lavorazione
  state.fornitori.forEach(f => {
    const c = cantMap[f.cantiere_id];
    if (!c) return;
    if (f.data_arrivo_merce) {
      events.push({
        id: 'fm_' + f.id,
        tipo: 'arrivo_merce',
        date: new Date(f.data_arrivo_merce + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Arrivo merce: ' + f.nome_fornitore,
        source: 'auto',
        cantiere: c,
        data: f
      });
    }
    if (f.data_inizio_stimata) {
      events.push({
        id: 'fl_' + f.id,
        tipo: 'inizio_lavorazione',
        date: new Date(f.data_inizio_stimata + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Inizio lavorazione: ' + f.nome_fornitore,
        source: 'auto',
        cantiere: c,
        data: f
      });
    }
    if (f.data_fine_stimata && f.tipo === 'lavorazione') {
      events.push({
        id: 'flf_' + f.id,
        tipo: 'fine_lavorazione',
        date: new Date(f.data_fine_stimata + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Fine lavorazione: ' + f.nome_fornitore,
        source: 'auto',
        cantiere: c,
        data: f
      });
    }
  });

  // varianti
  state.varianti.forEach(v => {
    const c = cantMap[v.cantiere_id];
    if (!c) return;
    if (v.data) {
      events.push({
        id: 'v_' + v.id,
        tipo: 'variante',
        date: new Date(v.data + 'T00:00'),
        titolo: c.nome,
        sottotitolo: 'Variante: ' + (v.descrizione || '').substring(0, 40),
        source: 'auto',
        cantiere: c,
        data: v
      });
    }
  });

  // ordina per data
  events.sort((a,b) => a.date - b.date);
  return events;
}

function getEventsForDay(day) {
  return getAllEvents().filter(e => sameDay(e.date, day));
}

// ============================================
// RENDER principale
// ============================================
function render() {
  if (state.view === 'mese') renderMonth();
  else if (state.view === 'settimana') renderWeek();
  else renderAgenda();
}

// ============================================
// VISTA MESE
// ============================================
function renderMonth() {
  const cur = state.currentDate;
  const year = cur.getFullYear();
  const month = cur.getMonth();

  const monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  $('current-label').innerHTML = `${monthNames[month]} <em>${year}</em>`;

  // primo giorno del mese e giorno settimana
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  // partenza: lunedì precedente (o il 1 se è lunedì)
  let startDay = firstDay.getDay(); // 0=dom
  if (startDay === 0) startDay = 7;
  const startDate = new Date(year, month, 1 - (startDay - 1));

  // 6 settimane sempre
  const days = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    days.push(d);
  }

  const allEvents = getAllEvents();
  const today = new Date();

  let html = `
    <div class="month-grid">
      <div class="month-header">
        <div>Lun</div><div>Mar</div><div>Mer</div><div>Gio</div><div>Ven</div><div>Sab</div><div>Dom</div>
      </div>
      <div class="month-cells">
  `;

  days.forEach(d => {
    const isOther = d.getMonth() !== month;
    const isToday = sameDay(d, today);
    const dayEvents = allEvents.filter(e => sameDay(e.date, d));
    const maxShow = 3;
    const shown = dayEvents.slice(0, maxShow);
    const rest = dayEvents.length - maxShow;

    html += `
      <div class="day-cell ${isOther?'other-month':''} ${isToday?'today':''}" onclick="onDayClick('${d.toISOString()}')">
        <div class="day-num">${d.getDate()}</div>
        <div class="day-events">
          ${shown.map(e => `
            <div class="event-chip type-${e.tipo}" onclick="event.stopPropagation(); openDetail('${e.id}')"
                 title="${escapeHtml(e.titolo + ' — ' + e.sottotitolo)}">
              ${escapeHtml(e.titolo)}
            </div>
          `).join('')}
          ${rest > 0 ? `<div class="more-events">+${rest} altri</div>` : ''}
        </div>
      </div>
    `;
  });
  html += '</div></div>';

  $('view-mese').innerHTML = html;
}

// click su giorno: apre form nuovo evento con quella data pre-impostata
function onDayClick(iso) {
  const d = new Date(iso);
  openNewEvent(d);
}

// ============================================
// VISTA SETTIMANA
// ============================================
function renderWeek() {
  const cur = state.currentDate;
  const start = startOfWeek(cur);
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    weekDays.push(d);
  }
  const end = weekDays[6];

  const monthNames = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  const labelStart = `${weekDays[0].getDate()} ${monthNames[weekDays[0].getMonth()]}`;
  const labelEnd = `${end.getDate()} ${monthNames[end.getMonth()]} ${end.getFullYear()}`;
  $('current-label').innerHTML = `${labelStart} — <em>${labelEnd}</em>`;

  const today = new Date();
  const dayNames = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  const allEvents = getAllEvents();

  let header = '<div class="week-header"><div></div>';
  weekDays.forEach((d,i) => {
    const isToday = sameDay(d, today);
    header += `<div class="week-day-header ${isToday?'today':''}">
      <div class="dn">${dayNames[i]}</div>
      <div class="dd">${d.getDate()}</div>
    </div>`;
  });
  header += '</div>';

  // body orari 7-21
  let body = '<div class="week-body">';
  for (let h = 7; h <= 21; h++) {
    body += `<div class="hour-label">${String(h).padStart(2,'0')}:00</div>`;
    weekDays.forEach(d => {
      const cellEvents = allEvents.filter(e => sameDay(e.date, d) && e.date.getHours() === h);
      body += `<div class="hour-cell" onclick="onHourClick('${d.toISOString()}', ${h})">
        ${cellEvents.map(e => `
          <div class="hour-event type-${e.tipo}" onclick="event.stopPropagation(); openDetail('${e.id}')"
               title="${escapeHtml(e.titolo + ' — ' + e.sottotitolo)}">
            ${e.source==='manual' ? fmtTime(e.date)+' ' : ''}${escapeHtml(e.titolo)}
          </div>
        `).join('')}
      </div>`;
    });
  }
  body += '</div>';

  // eventi senza orario (scadenze auto con 00:00) mostrati sopra
  const allDayEvents = [];
  weekDays.forEach(d => {
    const ev = allEvents.filter(e => sameDay(e.date, d) && e.source === 'auto');
    ev.forEach(e => allDayEvents.push({...e, dayIdx: weekDays.findIndex(x => sameDay(x, d))}));
  });

  let allDayRow = '';
  if (allDayEvents.length) {
    allDayRow = `<div style="display:grid;grid-template-columns:50px repeat(7,1fr);background:rgba(0,0,0,0.2);border-bottom:1px solid var(--border);padding:4px 0;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--ivory-muted);text-align:right;padding-right:4px;">tutto il giorno</div>`;
    for (let i = 0; i < 7; i++) {
      const dayEvts = allDayEvents.filter(e => e.dayIdx === i);
      allDayRow += '<div style="padding:2px;">';
      dayEvts.forEach(e => {
        allDayRow += `<div class="hour-event type-${e.tipo}" onclick="openDetail('${e.id}')"
                       title="${escapeHtml(e.titolo + ' — ' + e.sottotitolo)}"
                       style="margin-bottom:2px;">${escapeHtml(e.titolo)}</div>`;
      });
      allDayRow += '</div>';
    }
    allDayRow += '</div>';
  }

  $('view-settimana').innerHTML = `<div class="week-grid">${header}${allDayRow}${body}</div>`;
}

function onHourClick(iso, hour) {
  const d = new Date(iso);
  d.setHours(hour, 0, 0, 0);
  openNewEvent(d);
}

// ============================================
// VISTA AGENDA
// ============================================
function renderAgenda() {
  const cur = state.currentDate;
  const monthNames = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  $('current-label').innerHTML = `${monthNames[cur.getMonth()]} <em>${cur.getFullYear()}</em>`;

  const allEvents = getAllEvents();
  // filtro per mese corrente (agenda mostra il mese selezionato)
  const monthEvents = allEvents.filter(e =>
    e.date.getFullYear() === cur.getFullYear() && e.date.getMonth() === cur.getMonth()
  );

  if (monthEvents.length === 0) {
    $('view-agenda').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📅</div>
        <h3>Nessun <em>evento</em></h3>
        <p>Non ci sono eventi o scadenze in questo mese</p>
      </div>
    `;
    return;
  }

  // raggruppo per giorno
  const byDay = {};
  monthEvents.forEach(e => {
    const key = e.date.toISOString().split('T')[0];
    if (!byDay[key]) byDay[key] = [];
    byDay[key].push(e);
  });

  const today = new Date();
  const dayNames = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const monthShort = ['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];

  let html = '<div class="agenda-list">';
  Object.keys(byDay).sort().forEach(key => {
    const d = new Date(key + 'T12:00');
    const isToday = sameDay(d, today);
    const events = byDay[key];
    html += `
      <div class="agenda-day">
        <div class="agenda-day-header ${isToday?'today':''}">
          <div class="agenda-day-number">${d.getDate()}</div>
          <div class="agenda-day-info">
            <div class="agenda-day-weekday">${dayNames[d.getDay()]}${isToday ? ' · oggi' : ''}</div>
            <div class="agenda-day-month">${monthShort[d.getMonth()]} ${d.getFullYear()}</div>
          </div>
        </div>
        <div class="agenda-events">
          ${events.map(e => `
            <div class="agenda-event" onclick="openDetail('${e.id}')">
              <div class="agenda-time">${e.source==='manual' ? fmtTime(e.date) : 'tutto'}</div>
              <div class="agenda-dot dot-${e.tipo.replace('cantiere_','').replace('_','')}" style="background: var(${getColorVar(e.tipo)});"></div>
              <div class="agenda-content">
                <div class="agenda-title">${escapeHtml(e.titolo)}</div>
                <div class="agenda-sub">${escapeHtml(e.sottotitolo || '')}</div>
                ${e.source === 'manual' && e.data && e.data.luogo ? `<div class="agenda-meta">📍 ${escapeHtml(e.data.luogo)}</div>` : ''}
                ${e.source === 'manual' && e.data && e.data.con_chi ? `<div class="agenda-meta">👤 ${escapeHtml(e.data.con_chi)}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  html += '</div>';
  $('view-agenda').innerHTML = html;
}

function getColorVar(tipo) {
  const map = {
    appuntamento: '--terra-dark',
    sopralluogo: '--blue',
    visita_cantiere: '--purple',
    cantiere_inizio: '--green',
    cantiere_fine: '--red',
    arrivo_merce: '--yellow',
    inizio_lavorazione: '--blue',
    fine_lavorazione: '--blue',
    variante: '--purple'
  };
  return map[tipo] || '--terra';
}

// ============================================
// NAV
// ============================================
function navPrev() {
  const d = state.currentDate;
  if (state.view === 'mese' || state.view === 'agenda') {
    state.currentDate = new Date(d.getFullYear(), d.getMonth() - 1, 1);
  } else {
    state.currentDate = new Date(d); state.currentDate.setDate(d.getDate() - 7);
  }
  render();
}

function navNext() {
  const d = state.currentDate;
  if (state.view === 'mese' || state.view === 'agenda') {
    state.currentDate = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  } else {
    state.currentDate = new Date(d); state.currentDate.setDate(d.getDate() + 7);
  }
  render();
}

function navToday() {
  state.currentDate = new Date();
  render();
}

// VIEW SWITCH
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    $('view-agenda').style.display = state.view === 'agenda' ? 'block' : 'none';
    render();
  };
});

// ============================================
// MODAL NUOVO / MODIFICA EVENTO MANUALE
// ============================================
function openNewEvent(preDate) {
  $('ev-id').value = '';
  $('modal-event-title').innerHTML = 'Nuovo <em>evento</em>';
  $('btn-delete-event').style.display = 'none';
  $('evt-app').checked = true;
  $('ev-titolo').value = '';
  const d = preDate || new Date();
  $('ev-data').value = d.toISOString().split('T')[0];
  const defHour = d.getHours() && d.getHours() !== 0 ? d.getHours() : 9;
  $('ev-ora').value = String(defHour).padStart(2,'0') + ':00';
  $('ev-cantiere').value = '';
  $('ev-luogo').value = '';
  $('ev-con-chi').value = '';
  $('ev-note').value = '';
  openModal('modal-event');
  setTimeout(() => $('ev-titolo').focus(), 100);
}

function editEvent(ev) {
  $('ev-id').value = ev.id;
  $('modal-event-title').innerHTML = 'Modifica <em>evento</em>';
  $('btn-delete-event').style.display = 'inline-block';
  document.querySelector(`input[name="ev-tipo"][value="${ev.tipo}"]`).checked = true;
  $('ev-titolo').value = ev.titolo || '';
  const d = new Date(ev.data_ora);
  $('ev-data').value = d.toISOString().split('T')[0];
  $('ev-ora').value = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  $('ev-cantiere').value = ev.cantiere_id || '';
  $('ev-luogo').value = ev.luogo || '';
  $('ev-con-chi').value = ev.con_chi || '';
  $('ev-note').value = ev.note || '';
  openModal('modal-event');
}

async function saveEvent() {
  const titolo = $('ev-titolo').value.trim();
  const data = $('ev-data').value;
  const ora = $('ev-ora').value;
  if (!titolo || !data || !ora) { toast('Compila titolo, data e ora', 'error'); return; }

  const tipo = document.querySelector('input[name="ev-tipo"]:checked').value;
  const dt = new Date(data + 'T' + ora);
  const payload = {
    titolo,
    tipo,
    data_ora: dt.toISOString(),
    cantiere_id: $('ev-cantiere').value || null,
    luogo: $('ev-luogo').value.trim() || null,
    con_chi: $('ev-con-chi').value.trim() || null,
    note: $('ev-note').value.trim() || null
  };

  const id = $('ev-id').value;
  showLoader('Salvataggio…');
  try {
    if (id) {
      const { error } = await sb.from('eventi').update(payload).eq('id', id);
      if (error) throw error;
    } else {
      const { error } = await sb.from('eventi').insert(payload);
      if (error) throw error;
    }
    closeModal('modal-event');
    toast('Salvato', 'success');
    await loadAll();
  } catch (err) {
    toast('Errore: ' + err.message, 'error');
  } finally {
    hideLoader();
  }
}

async function deleteEvent() {
  const id = $('ev-id').value;
  if (!id) return;
  if (!confirm('Eliminare questo evento?')) return;
  const { error } = await sb.from('eventi').delete().eq('id', id);
  if (error) { toast('Errore: ' + error.message, 'error'); return; }
  closeModal('modal-event');
  toast('Eliminato');
  await loadAll();
}

// ============================================
// MODAL DETTAGLIO (per scadenze auto + anche manuali)
// ============================================
function openDetail(eventId) {
  const all = getAllEvents();
  const ev = all.find(e => e.id === eventId);
  if (!ev) return;
  state.currentDetail = ev;

  const typeLabels = {
    appuntamento: '📅 Appuntamento',
    sopralluogo: '🔍 Sopralluogo',
    visita_cantiere: '🏗️ Visita cantiere',
    cantiere_inizio: '🟢 Inizio cantiere',
    cantiere_fine: '🔴 Fine cantiere prevista',
    arrivo_merce: '📦 Arrivo merce',
    inizio_lavorazione: '🔨 Inizio lavorazione',
    fine_lavorazione: '✅ Fine lavorazione',
    variante: '🔄 Variante'
  };

  $('detail-title').innerHTML = escapeHtml(ev.titolo);
  $('detail-type').textContent = typeLabels[ev.tipo] || ev.tipo;
  $('detail-dot').style.background = `var(${getColorVar(ev.tipo)})`;

  let body = `<div class="detail-row">
    <div class="lbl">Data</div>
    <div class="val">${fmtDate(ev.date)}${ev.source==='manual' ? ' ore ' + fmtTime(ev.date) : ''}</div>
  </div>`;

  if (ev.sottotitolo) {
    body += `<div class="detail-row">
      <div class="lbl">${ev.source==='auto' ? 'Scadenza' : 'Dettaglio'}</div>
      <div class="val">${escapeHtml(ev.sottotitolo)}</div>
    </div>`;
  }

  if (ev.cantiere) {
    body += `<div class="detail-row">
      <div class="lbl">Cantiere</div>
      <div class="val">${escapeHtml(ev.cantiere.nome)}${ev.cantiere.cliente ? ' · ' + escapeHtml(ev.cantiere.cliente) : ''}</div>
    </div>`;
  }

  if (ev.source === 'manual' && ev.data) {
    if (ev.data.luogo) {
      body += `<div class="detail-row"><div class="lbl">Luogo</div><div class="val">${escapeHtml(ev.data.luogo)}</div></div>`;
    }
    if (ev.data.con_chi) {
      body += `<div class="detail-row"><div class="lbl">Con chi</div><div class="val">${escapeHtml(ev.data.con_chi)}</div></div>`;
    }
    if (ev.data.note) {
      body += `<div class="detail-row"><div class="lbl">Note</div><div class="val">${escapeHtml(ev.data.note)}</div></div>`;
    }
  }

  if (ev.source === 'auto' && ev.tipo === 'variante' && ev.data) {
    if (ev.data.descrizione) {
      body += `<div class="detail-row"><div class="lbl">Descrizione</div><div class="val">${escapeHtml(ev.data.descrizione)}</div></div>`;
    }
    if (ev.data.importo) {
      body += `<div class="detail-row"><div class="lbl">Importo</div><div class="val">€ ${Number(ev.data.importo).toLocaleString('it-IT', {minimumFractionDigits:2})}</div></div>`;
    }
  }

  $('detail-body').innerHTML = body;
  $('detail-edit-btn').style.display = ev.source === 'manual' ? 'inline-block' : 'none';
  openModal('modal-detail');
}

function editCurrentEvent() {
  if (!state.currentDetail || state.currentDetail.source !== 'manual') return;
  closeModal('modal-detail');
  editEvent(state.currentDetail.data);
}

// ============================================
// INIT
// ============================================
loadAll();
</script>
