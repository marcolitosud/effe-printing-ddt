<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Sopralluoghi — Studio Pizzone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1a1410; --bg-soft: #221b15;
    --bg-card: rgba(245,241,232,0.06); --bg-card-hover: rgba(245,241,232,0.1);
    --border: rgba(245,241,232,0.14); --border-hover: rgba(201,167,111,0.55);
    --ivory: #fbf8f0; --ivory-soft: #e8e0cc; --ivory-muted: rgba(251,248,240,0.75); --ivory-faint: rgba(251,248,240,0.5);
    --terra: #c9a76f; --terra-soft: #b8935f; --accent: #d9ba85;
    --green: #7fb069; --yellow: #e6b34a; --red: #d4675b; --blue: #6ba3d4;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--ivory); font-family: 'Inter', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; min-height: 100vh; min-height: 100dvh; }
  body {
    background-image:
      linear-gradient(rgba(245,241,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,241,232,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(26,20,16,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 14px;
  }
  .back-btn {
    background: var(--bg-card); border: 1px solid var(--border); color: var(--ivory);
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; font-size: 18px;
  }
  .topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; flex: 1; letter-spacing: -0.005em; }
  .topbar-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px 120px; }
  @media (min-width: 700px) { .container { padding: 32px 24px 120px; } }

  .info-card {
    background: rgba(201,167,111,0.08);
    border: 1px dashed rgba(201,167,111,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ivory-muted);
    line-height: 1.5;
  }
  .info-card strong { color: var(--terra); font-weight: 500; }

  .cantieri-grid {
    display: grid; grid-template-columns: 1fr; gap: 12px;
  }
  @media (min-width: 700px) { .cantieri-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
  @media (min-width: 1000px) { .cantieri-grid { grid-template-columns: repeat(3, 1fr); } }

  .cantiere {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    text-decoration: none; color: inherit; display: block;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .cantiere::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--terra);
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s;
  }
  .cantiere:hover {
    background: var(--bg-card-hover); border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .cantiere:hover::before { transform: scaleX(1); }
  .cantiere:active { transform: scale(0.99); }

  .cantiere-title {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500;
    line-height: 1.15; letter-spacing: -0.005em; margin-bottom: 4px;
  }
  .cantiere-title em { font-style: italic; color: var(--terra); font-weight: 400; }

  .cantiere-client { font-size: 13px; color: var(--ivory-muted); margin-bottom: 14px; }

  .cantiere-stats {
    padding-top: 14px; border-top: 1px solid var(--border);
    display: flex; gap: 14px; justify-content: space-between; align-items: baseline;
  }

  .stat-block {
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-block .val {
    font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500;
    color: var(--terra); line-height: 1;
  }
  .stat-block .lbl {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--ivory-muted);
  }

  .badge-sopralluogo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 5px;
    background: rgba(127,176,105,0.15); color: var(--green);
    border: 1px solid rgba(127,176,105,0.3);
  }
  .badge-none {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 4px 8px; border-radius: 5px;
    background: rgba(245,241,232,0.06); color: var(--ivory-muted);
    border: 1px solid var(--border);
  }

  .empty { text-align: center; padding: 80px 20px; color: var(--ivory-muted); }
  .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty h3 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; margin-bottom: 10px; color: var(--ivory); }
  .empty h3 em { font-style: italic; color: var(--terra); }
  .empty p { font-size: 14px; margin-bottom: 24px; }

  .btn {
    background: var(--terra); color: var(--bg);
    border: none; padding: 12px 24px; border-radius: 12px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; cursor: pointer;
    font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
    text-decoration: none;
  }

  .loader {
    display: inline-block; width: 40px; height: 40px;
    border: 3px solid var(--border); border-top-color: var(--terra);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(26,20,16,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(8px);
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">‹</a>
  <div class="topbar-title">Sopralluoghi <em>cantieri</em></div>
</div>

<div class="container">

  <div class="info-card">
    <strong>📐 Modulo sopralluogo</strong><br>
    Seleziona un cantiere per gestire il rilievo fotografico: carica piantine per piano, aggiungi punti di rilievo con foto, direzione dello sguardo, note e misure.
  </div>

  <div id="container"></div>

</div>

<div class="loading-overlay" id="loading"><div class="loader"></div></div>

<script>
const SUPABASE_URL = 'https://dlswafwbliqabozeuapv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_FpMAG0z69Exc9KQZp4m3Qw_JhYlqIC0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function $(id) { return document.getElementById(id); }
function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function load() {
  $('loading').style.display = 'flex';
  try {
    const { data: cantieri } = await sb.from('cantieri').select('id, nome, cliente, stato').order('created_at', { ascending: false });
    const { data: sopr } = await sb.from('sopralluoghi').select('id, cantiere_id, nome, data_sopralluogo');
    const sMap = {};
    (sopr || []).forEach(s => {
      if (!sMap[s.cantiere_id]) sMap[s.cantiere_id] = [];
      sMap[s.cantiere_id].push(s);
    });

    const c = $('container');
    if (!cantieri || cantieri.length === 0) {
      c.innerHTML = `<div class="empty">
        <div class="empty-icon">🏗️</div>
        <h3>Nessun <em>cantiere</em></h3>
        <p>Crea prima un cantiere per iniziare un sopralluogo</p>
        <a href="cantieri.html" class="btn">Vai ai cantieri</a>
      </div>`;
      return;
    }

    c.innerHTML = '<div class="cantieri-grid">' + cantieri.map(cc => {
      const list = sMap[cc.id] || [];
      const count = list.length;
      return `
        <a href="sopralluogo-dettaglio.html?cantiere=${cc.id}" class="cantiere">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:8px;">
            <div class="cantiere-title">${escapeHtml(cc.nome)}</div>
            <span class="${count>0?'badge-sopralluogo':'badge-none'}">${count>0?count+' fatti':'nuovo'}</span>
          </div>
          ${cc.cliente ? `<div class="cantiere-client">${escapeHtml(cc.cliente)}</div>` : ''}
          <div class="cantiere-stats">
            <div class="stat-block">
              <div class="val">${count}</div>
              <div class="lbl">Sopralluoghi</div>
            </div>
            ${count > 0 ? `<div class="stat-block" style="text-align:right;">
              <div class="val" style="font-size:12px;">${new Date(list[list.length-1].data_sopralluogo).toLocaleDateString('it-IT')}</div>
              <div class="lbl">Ultimo</div>
            </div>` : ''}
          </div>
        </a>
      `;
    }).join('') + '</div>';
  } catch (err) {
    console.error(err);
  } finally {
    $('loading').style.display = 'none';
  }
}

load();
</script>

</body>
</html>
